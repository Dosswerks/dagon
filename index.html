                mines.splice(i, 1);
            }
        }
    }

    // ── Enemy Spawning ──────────────────────────────────────────

    function spawnEnemyOfType(type, speedMult, fireRateMult) {
        const pos = findSafeSpawnPosition(
            player ? player.x : WORLD_W / 2,
            player ? player.y : H / 2,
            enemies, SPAWN_CFG.minDistFromPlayer, WORLD_W
        );
        let e;
        switch (type) {
            case 'abductor':
                e = new Abductor(pos.x, pos.y, speedMult);
                break;
            case 'crab':
                e = new Crab(pos.x, SEA_BOTTOM_Y - ENEMY_CFG.crab.h, speedMult);
                break;
            case 'pursuer':
                e = new Pursuer(pos.x, pos.y, speedMult, fireRateMult);
                break;
            case 'drifter':
                e = new Drifter(pos.x, pos.y, speedMult);
                break;
        }
        if (e) enemies.push(e);
    }

    // ── Level Initialization ────────────────────────────────────

    function initLevel(level) {
        enemies = [];
        deepOnes = [];
        mines = [];
        tentacles = [];
        playerProjectilePool.releaseAll();
        enemyProjectilePool.releaseAll();
        particlePool.releaseAll();

        // Reset or create Monolith at center of world
        if (!monolith) {
            monolith = new Monolith(WORLD_W / 2 - MONOLITH_CFG.w / 2, SEA_BOTTOM_Y - MONOLITH_CFG.h);
        } else {
            monolith.hp = MONOLITH_CFG.maxHP;
            monolith.damageState = 0;
            monolith.alive = true;
        }

        // Spawn Deep Ones evenly across playfield
        for (let i = 0; i < DEEP_ONE_CFG.count; i++) {
            const x = (WORLD_W / DEEP_ONE_CFG.count) * i + randomRange(-20, 20);
            const d = new DeepOne(wrapPosition(x, WORLD_W), SEA_BOTTOM_Y - DEEP_ONE_CFG.h);
            d.spawnX = d.x;
            deepOnes.push(d);
        }

        // Spawn tentacle obstacles (anchored behind ocean floor, no overlapping)
        const tentacleCount = Math.round(randomRange(TENTACLE_CFG.count.min, TENTACLE_CFG.count.max));
        for (let i = 0; i < tentacleCount; i++) {
            let x = 0;
            let placed = false;
            for (let attempt = 0; attempt < 30; attempt++) {
                x = rng() * WORLD_W;
                let overlap = false;
                for (let r = 0; r < groundOccupiedRanges.length; r++) {
                    const range = groundOccupiedRanges[r];
                    if (x + TENTACLE_CFG.w > range.x && x < range.x + range.w) {
                        overlap = true;
                        break;
                    }
                }
                if (!overlap) { placed = true; break; }
            }
            if (!placed) continue;
            groundOccupiedRanges.push({ x: x, w: TENTACLE_CFG.w + 20 });
            const h = randomRange(TENTACLE_CFG.minHeight, TENTACLE_CFG.maxHeight);
            const baseY = getTerrainHeight(x);
            tentacles.push({
                x: x,
                baseY: baseY,
                h: h,
                w: TENTACLE_CFG.w,
                phase: rng() * Math.PI * 2,
                riseAmount: 0,
                riseDir: 1,
                pauseTimer: 0,
                riseDelay: rng() * 5000,
            });
        }

        // Spawn enemies
        const speedMult = getScaledValue(SCALING.speedMultiplier, level);
        const fireMult = getScaledValue(SCALING.fireRateMult, level);
        const abCount = Math.round(getScaledValue(SCALING.abductorCount, level));
        const crCount = Math.round(getScaledValue(SCALING.crabCount, level));
        const puCount = Math.round(getScaledValue(SCALING.pursuerCount, level));
        const drCount = Math.round(getScaledValue(SCALING.drifterCount, level));

        for (let i = 0; i < abCount; i++) spawnEnemyOfType('abductor', speedMult, fireMult);
        for (let i = 0; i < crCount; i++) spawnEnemyOfType('crab', speedMult, fireMult);
        for (let i = 0; i < puCount; i++) spawnEnemyOfType('pursuer', speedMult, fireMult);
        for (let i = 0; i < drCount; i++) spawnEnemyOfType('drifter', speedMult, fireMult);

        // Create or respawn player
        if (!player) {
            player = new Player(WORLD_W / 4, H / 2);
        } else {
            player.alive = true;
            player.invincibilityTimer = PLAYER_CFG.invincibilityDuration;
            player.vx = 0;
            player.vy = 0;
            player.isDashing = false;
            player.dashTimer = 0;
        }

        state.enemiesRemaining = enemies.length;
        state.enemiesSpawnedThisLevel = enemies.length;
        state.deepOnesRemaining = deepOnes.length;

        // Snap camera to player (immediate, no lerp)
        camera.x = player.x + player.w / 2 - W / 2;
        camera.y = player.y + player.h / 2 - H / 2 + CAMERA_CFG.verticalBias;
        camera.y = Math.max(0, Math.min(SEA_BOTTOM_Y + GROUND_H - H, camera.y));
        camera.targetX = camera.x;
        camera.targetY = camera.y;
        camera.lookAheadX = 0;
    }

    // ── Rendering Helpers ───────────────────────────────────────

    /** Convert world X to screen X, accounting for camera and world wrap. */
    function worldToScreenX(wx) {
        let rel = wx - camera.x;
        if (rel < -WORLD_W / 2) rel += WORLD_W;
        if (rel > WORLD_W / 2) rel -= WORLD_W;
        return rel + camera.shakeX;
    }

    function worldToScreenY(wy) {
        return wy - camera.y + camera.shakeY;
    }

    /** Draw an entity as a colored rectangle with world-wrap handling. */
    function drawEntity(e, color) {
        const sx = worldToScreenX(e.x);
        const sy = worldToScreenY(e.y);
        // Hit flash override
        const c = e.flashTimer > 0 ? '#ffffff' : color;
        ctx.fillStyle = c;
        // Draw at primary position
        if (sx + e.w > 0 && sx < W && sy + e.h > 0 && sy < H) {
            ctx.fillRect(sx, sy, e.w, e.h);
        }
        // Draw wrapped copy if near world edge
        if (sx < 0) {
            ctx.fillRect(sx + WORLD_W, sy, e.w, e.h);
        } else if (sx + e.w > W) {
            ctx.fillRect(sx - WORLD_W, sy, e.w, e.h);
        }
    }

    /**
     * Draw an enemy using sprite images with glow points overlay.
     * Falls back to colored rectangle if sprites aren't loaded.
     * Handles horizontal flipping based on movement direction,
     * glow point rendering, and abductor carry glow.
     */
    function drawEnemy(e, fallbackColor) {
        const sx = worldToScreenX(e.x);
        const sy = worldToScreenY(e.y);
        if (sx + e.w < -50 || sx > W + 50 || sy + e.h < -50 || sy > H + 50) return;

        // Determine facing direction from velocity (default: right)
        const facingRight = e.vx >= 0;

        // Pick sprite frame
        const frameKey = e.type + '_' + (e.animFrame + 1); // e.g. 'abductor_1', 'abductor_2'
        const img = assets[frameKey];

        // Abductor carry glow: pulse light blue outline around non-transparent pixels
        const isCarrying = e.type === 'abductor' && e.target && e.target.alive && e.target.beingAbducted;
        if (isCarrying && img && img.complete && img.naturalWidth > 0) {
            const glowAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
            ctx.save();
            ctx.globalAlpha = glowAlpha;
            ctx.shadowColor = '#4fc3f7';
            ctx.shadowBlur = 8;
            // Draw the sprite multiple times offset by 1-2px in each direction
            // to create an outline glow around non-transparent pixels
            const offsets = [[-2,0],[2,0],[0,-2],[0,2],[-1,-1],[1,-1],[-1,1],[1,1]];
            for (let o = 0; o < offsets.length; o++) {
                const ox = offsets[o][0], oy = offsets[o][1];
                if (!facingRight) {
                    ctx.save();
                    ctx.translate(sx + e.w + ox, sy + oy);
                    ctx.scale(-1, 1);
                    ctx.drawImage(img, 0, 0, e.w, e.h);
                    ctx.restore();
                } else {
                    ctx.drawImage(img, sx + ox, sy + oy, e.w, e.h);
                }
            }
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        // Hit flash
        if (e.flashTimer > 0) {
            ctx.globalAlpha = 0.7;
        }

        if (img && img.complete && img.naturalWidth > 0) {
            ctx.save();
            if (!facingRight) {
                ctx.translate(sx + e.w, sy);
                ctx.scale(-1, 1);
                ctx.drawImage(img, 0, 0, e.w, e.h);
            } else {
                ctx.drawImage(img, sx, sy, e.w, e.h);
            }
            ctx.restore();

            // Hit flash white overlay
            if (e.flashTimer > 0) {
                ctx.globalCompositeOperation = 'source-atop';
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(sx, sy, e.w, e.h);
                ctx.globalCompositeOperation = 'source-over';
            }
        } else {
            // Fallback: colored rectangle
            ctx.fillStyle = e.flashTimer > 0 ? '#ffffff' : fallbackColor;
            ctx.fillRect(sx, sy, e.w, e.h);
        }

        ctx.globalAlpha = 1;

        // Draw glow points
        const glowFrames = ENEMY_GLOW_POINTS[e.type];
        if (glowFrames) {
            const frameIdx = Math.min(e.animFrame, glowFrames.length - 1);
            const points = glowFrames[frameIdx];
            if (points) {
                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const color = p.color || '#ffeb3b';
                    // Flip X position if facing left
                    const px = facingRight ? p.x : (e.w - 1 - p.x);
                    // Glow: draw a 3×3 soft glow behind, then 1×1 bright pixel
                    const gx = sx + px;
                    const gy = sy + p.y;
                    ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.008 + i) * 0.2;
                    ctx.fillStyle = color;
                    ctx.fillRect(gx - 1, gy - 1, 3, 3);
                    ctx.globalAlpha = 1.0;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(gx, gy, 1, 1);
                }
            }
        }
    }

    /** Draw the player with a 2-frame animation using sprite images. */
    function drawPlayer() {
        if (!player || !player.alive) return;
        const sx = worldToScreenX(player.x);
        const sy = worldToScreenY(player.y);
        // Invincibility flash (suppressed during attract mode)
        if (player.invincibilityTimer > 0 && !state.attractMode && Math.floor(player.invincibilityTimer) % 4 < 2) {
            ctx.globalAlpha = 0.4;
        }
        // Dash trail
        if (player.isDashing) {
            ctx.globalAlpha = 0.2;
            const trailDir = player.facingRight ? -1 : 1;
            const trailImg = player.animFrame === 0 ? assets.player_1 : assets.player_2;
            if (trailImg && trailImg.complete && trailImg.naturalWidth > 0) {
                for (let t = 1; t <= 3; t++) {
                    ctx.globalAlpha = 0.12 / t;
                    ctx.save();
                    if (!player.facingRight) {
                        ctx.translate(sx + trailDir * t * 10 + player.w, sy);
                        ctx.scale(-1, 1);
                        ctx.drawImage(trailImg, 0, 0, player.w, player.h);
                    } else {
                        ctx.drawImage(trailImg, sx + trailDir * t * 10, sy, player.w, player.h);
                    }
                    ctx.restore();
                }
            }
            ctx.globalAlpha = player.invincibilityTimer > 0 && Math.floor(player.invincibilityTimer) % 4 < 2 ? 0.4 : 1.0;
        }

        // Pick sprite frame
        const img = player.animFrame === 0 ? assets.player_1 : assets.player_2;

        if (img && img.complete && img.naturalWidth > 0) {
            // Draw sprite — flip horizontally if facing left
            ctx.save();
            if (!player.facingRight) {
                ctx.translate(sx + player.w, sy);
                ctx.scale(-1, 1);
                ctx.drawImage(img, 0, 0, player.w, player.h);
            } else {
                ctx.drawImage(img, sx, sy, player.w, player.h);
            }
            ctx.restore();
        } else {
            // Fallback: simple colored rectangle while images load
            ctx.fillStyle = player.flashTimer > 0 ? '#ffffff' : '#4fc3f7';
            ctx.fillRect(sx, sy, player.w, player.h);
            // Nose
            ctx.fillStyle = '#b3e5fc';
            if (player.facingRight) {
                ctx.beginPath();
                ctx.moveTo(sx + player.w, sy + player.h / 2);
                ctx.lineTo(sx + player.w - 4, sy);
                ctx.lineTo(sx + player.w - 4, sy + player.h);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(sx, sy + player.h / 2);
                ctx.lineTo(sx + 4, sy);
                ctx.lineTo(sx + 4, sy + player.h);
                ctx.fill();
            }
        }

        // Hit flash overlay
        if (player.flashTimer > 0) {
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(sx, sy, player.w, player.h);
            ctx.globalCompositeOperation = 'source-over';
        }

        ctx.globalAlpha = 1.0;
    }

    // ── Attract Mode AI ────────────────────────────────────────

    /**
     * AI-driven demo player. Chases nearest enemy, fires periodically,
     * dodges nearby projectiles. Player is invincible during attract.
     */
    function attractAI(dt) {
        if (!player || !player.alive) return;

        // Make player invincible during demo
        player.invincibilityTimer = 999;

        // Find nearest enemy
        let nearestEnemy = null;
        let nearestDist = Infinity;
        for (let i = 0; i < enemies.length; i++) {
            const e = enemies[i];
            if (!e.alive) continue;
            let dx = e.x - player.x;
            if (dx > WORLD_W / 2) dx -= WORLD_W;
            if (dx < -WORLD_W / 2) dx += WORLD_W;
            const dy = e.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < nearestDist) {
                nearestDist = dist;
                nearestEnemy = e;
            }
        }

        // Build fake input for player
        const aiInput = { left: false, right: false, up: false, down: false, fire: false, dash: false, bomb: false, fireBuffered: false };

        if (nearestEnemy) {
            let dx = nearestEnemy.x - player.x;
            if (dx > WORLD_W / 2) dx -= WORLD_W;
            if (dx < -WORLD_W / 2) dx += WORLD_W;
            const dy = nearestEnemy.y - player.y;

            // Move toward enemy
            if (dx > 20) aiInput.right = true;
            else if (dx < -20) aiInput.left = true;
            if (dy > 10) aiInput.down = true;
            else if (dy < -10) aiInput.up = true;

            // Fire when roughly aligned
            if (Math.abs(dy) < 30 && Math.abs(dx) < 300) {
                aiInput.fire = true;
                aiInput.fireBuffered = true;
            }
        } else {
            // No enemies — drift right
            aiInput.right = true;
        }

        // Dodge nearby enemy projectiles
        enemyProjectilePool.forEach((p) => {
            const pdx = p.x - player.x;
            const pdy = p.y - player.y;
            if (Math.abs(pdx) < 40 && Math.abs(pdy) < 40) {
                // Dodge vertically away from projectile
                if (pdy > 0) aiInput.up = true;
                else aiInput.down = true;
            }
        });

        // Update player with AI input
        player.update(dt, aiInput);
        if (aiInput.fire || aiInput.fireBuffered) {
            player.fire(playerProjectilePool);
        }

        // Update camera
        updateCamera(dt);

        // Update enemies
        const attackingCrabCount = enemies.filter(e => e.alive && e.type === 'crab' && e.state === 'ATTACKING').length;
        for (let i = 0; i < enemies.length; i++) {
            const e = enemies[i];
            if (!e.alive) continue;
            switch (e.type) {
                case 'abductor': e.update(dt, deepOnes, monolith, player); break;
                case 'crab': e.update(dt, monolith, attackingCrabCount); break;
                case 'pursuer': if (player) e.update(dt, player.x, player.y); break;
                case 'drifter': e.update(dt); break;
                case 'mutant': if (player) e.update(dt, player.x, player.y); break;
            }
        }

        // Update Deep Ones
        const enemiesCleared = enemies.filter(e => e.alive).length === 0;
        for (let i = 0; i < deepOnes.length; i++) {
            if (deepOnes[i].alive) deepOnes[i].update(dt, monolith, enemiesCleared);
        }

        // Update projectiles
        playerProjectilePool.forEach((p) => { p.update(dt); if (!p.alive) playerProjectilePool.release(p); });
        enemyProjectilePool.forEach((p) => { p.update(dt); if (!p.alive) enemyProjectilePool.release(p); });
        particlePool.forEach((p) => { p.update(dt); if (!p.alive) particlePool.release(p); });

        // Collisions (player projectiles vs enemies only — player is invincible)
        playerProjectilePool.forEach((proj) => {
            if (!proj.alive) return;
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (!e.alive) continue;
                if (aabb(proj.getHitbox(), e.getHitbox())) {
                    proj.kill();
                    playerProjectilePool.release(proj);
                    spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, '#44ff66', 30);
                    e.kill();
                    break;
                }
            }
        });

        // Cleanup dead entities
        for (let i = enemies.length - 1; i >= 0; i--) {
            if (!enemies[i].alive) enemies.splice(i, 1);
        }
    }

    // ── Game Loop ───────────────────────────────────────────────

    /**
     * Main update function. Dispatches to the appropriate logic
     * based on the current game state mode.
     */
    function update(dt) {
        switch (state.mode) {
            case 'START_SCREEN':
                // Attract mode: count down, then start demo
                if (!state.attractMode) {
                    state.attractTimer -= dt;
                    if (state.attractTimer <= 0) {
                        // Start attract demo
                        state.attractMode = true;
                        state.attractPhase = 'demo';
                        state.attractTimer = 900; // ~15 seconds of demo
                        generateBackground();
                        initLevel(1);
                        player.alive = true;
                    }
                } else {
                    // Running attract demo
                    state.attractTimer -= dt;
                    if (state.attractTimer <= 0) {
                        // Demo over, return to title
                        state.attractMode = false;
                        state.attractPhase = 'title';
                        state.attractTimer = 480;
                        enemies = [];
                        deepOnes = [];
                        mines = [];
                        tentacles = [];
                        player = null;
                    } else {
                        // AI-driven demo gameplay
                        attractAI(dt);
                    }
                }

                // Any real input breaks attract and/or starts game
                if (input.fire || input.bomb || input.dash) {
                    if (state.attractMode) {
                        // Break out of demo back to title
                        state.attractMode = false;
                        state.attractPhase = 'title';
                        state.attractTimer = 480;
                        enemies = [];
                        deepOnes = [];
                        mines = [];
                        tentacles = [];
                        player = null;
                    }
                    initAudio();
                    state.score = 0;
                    state.level = 1;
                    state.lives = PLAYER_CFG.startLives;
                    state.bombs = BOMB_CFG.startCount;
                    state.comboMultiplier = 1;
                    state.comboTimer = 0;
                    state.lossReason = null;
                    state.nextExtraLifeScore = SCORE_CFG.extraLifeInterval;
                    state.damageVignetteTimer = 0;
                    state.bombFlashTimer = 0;
                    state.monolithAlertTimer = 0;
                    state.deepOneAlertTimer = 0;
                    state.attractMode = false;
                    state.stats.levelsCompleted = 0;
                    state.stats.enemiesDestroyed = 0;
                    state.stats.deepOnesSaved = 0;
                    state.stats.maxCombo = 0;
                    state.stats.startTime = Date.now();
                    try {
                        state.highScore = validateHighScore(localStorage.getItem(AUDIO_CFG.highScoreKey));
                    } catch (e) {
                        state.highScore = 0;
                    }
                    generateBackground();
                    initLevel(state.level);
                    playSound('levelBegin');
                    startLoop('music', musicGain);
                    startLoop('ambient', ambientGain);
                    // Show level announcement
                    state.levelAnnounce = true;
                    state.transitionTimer = 150; // ~2.5 seconds
                    state.mode = 'LEVEL_TRANSITION';
                }
                break;

            case 'PLAYING':
                if (input.pause) {
                    setState('PAUSED');
                    state.pauseStartTime = performance.now();
                    return;
                }
                if (input.mute) {
                    state.muted = !state.muted;
                    updateMute();
                }

                // Update player
                if (player && player.alive) {
                    player.update(dt, input);
                    if (input.fire || input.fireBuffered) {
                        if (player.fire(playerProjectilePool)) {
                            playSound('playerFire');
                        }
                    }
                    if (input.dash) {
                        player.dash();
                    }
                    if (input.bomb) {
                        detonateBomb();
                    }
                }

                // Update camera
                updateCamera(dt);

                // Update enemies
                const attackingCrabCount = enemies.filter(
                    e => e.alive && e.type === 'crab' && e.state === 'ATTACKING'
                ).length;

                for (let i = 0; i < enemies.length; i++) {
                    const e = enemies[i];
                    if (!e.alive) continue;
                    switch (e.type) {
                        case 'abductor':
                            e.update(dt, deepOnes, monolith, player);
                            // Handle mutation: Abductor reached surface with Deep One
                            if (e.shouldMutate && e.target) {
                                e.target.kill(); // Deep One is lost
                                e.target = null;
                                const m = new Mutant(e.x, e.y);
                                enemies.push(m);
                                e.kill();
                            }
                            break;
                        case 'crab':
                            e.update(dt, monolith, attackingCrabCount);
                            break;
                        case 'pursuer':
                            if (player) {
                                e.update(dt, player.x, player.y);
                                // Handle firing
                                if (e.shouldFire && enemyProjectilePool.count < ENEMY_PROJ_CFG.maxOnScreen) {
                                    const dx = player.x - e.x;
                                    const dy = player.y - e.y;
                                    const dist = Math.sqrt(dx * dx + dy * dy);
                                    if (dist > 0) {
                                        // Spawn from front edge of sprite (toward player)
                                        const spawnX = dx > 0 ? e.x + e.w : e.x - 30;
                                        const spawnY = e.y + e.h / 2 - 15;
                                        enemyProjectilePool.acquire(
                                            spawnX, spawnY,
                                            (dx / dist) * ENEMY_PROJ_CFG.speed,
                                            (dy / dist) * ENEMY_PROJ_CFG.speed
                                        );
                                    }
                                    e.shouldFire = false;
                                }
                            }
                            break;
                        case 'drifter':
                            e.update(dt);
                            // Handle mine dropping
                            if (e.shouldDropMine && mines.length < MINE_CFG.maxOnScreen) {
                                mines.push({
                                    x: e.x + e.w / 2 - MINE_CFG.w / 2,
                                    y: e.y + e.h / 2 - MINE_CFG.h / 2,
                                    lifetime: MINE_CFG.lifetime,
                                    alive: true,
                                });
                                playSound('minePlacement');
                                e.shouldDropMine = false;
                            } else {
                                e.shouldDropMine = false;
                            }
                            break;
                        case 'mutant':
                            if (player) e.update(dt, player.x, player.y);
                            break;
                    }
                }

                // Update Deep Ones
                const enemiesCleared = state.enemiesRemaining === 0;
                for (let i = 0; i < deepOnes.length; i++) {
                    if (deepOnes[i].alive) {
                        deepOnes[i].update(dt, monolith, enemiesCleared);
                    }
                }

                // Update projectiles
                playerProjectilePool.forEach((p) => {
                    p.update(dt);
                    if (!p.alive) playerProjectilePool.release(p);
                });
                enemyProjectilePool.forEach((p) => {
                    p.update(dt);
                    if (!p.alive) enemyProjectilePool.release(p);
                });

                // Update mines (Drifter bombs)
                for (let i = mines.length - 1; i >= 0; i--) {
                    mines[i].lifetime -= dt;
                    if (mines[i].lifetime <= 0) {
                        mines.splice(i, 1);
                    }
                }

                // Update particles
                particlePool.forEach((p) => {
                    p.update(dt);
                    if (!p.alive) particlePool.release(p);
                });

                // Update bubbles
                if (Math.random() < PARALLAX.bubbleSpawnChance) {
                    bubbles.push({
                        x: camera.x + Math.random() * W,
                        y: SEA_BOTTOM_Y - Math.random() * 10,
                        r: 1 + Math.random() * 2,
                        alpha: 0.3 + Math.random() * 0.4,
                    });
                }
                for (let i = bubbles.length - 1; i >= 0; i--) {
                    bubbles[i].y -= PARALLAX.bubbleRiseSpeed * dt;
                    bubbles[i].x += Math.sin(bubbles[i].y * 0.05) * 0.2;
                    if (bubbles[i].y < SEA_SURFACE_Y - 10) bubbles.splice(i, 1);
                }

                // Caustic animation
                causticPhase += PARALLAX.causticAnimSpeed * dt;

                // Combo timer
                if (state.comboTimer > 0) {
                    state.comboTimer -= dt;
                    if (state.comboTimer <= 0) {
                        state.comboMultiplier = 1;
                        state.comboTimer = 0;
                    }
                }

                // Effect timers
                if (state.damageVignetteTimer > 0) state.damageVignetteTimer -= dt;
                if (state.bombFlashTimer > 0) state.bombFlashTimer -= dt;
                if (state.monolithAlertTimer > 0) state.monolithAlertTimer -= dt;
                if (state.deepOneAlertTimer > 0) state.deepOneAlertTimer -= dt;

                // Check Monolith destruction
                if (monolith && monolith.hp <= 0) {
                    state.lossReason = 'monolith_destroyed';
                    playSound('gameOver');
                    stopAllLoops();
                    setState('GAME_OVER');
                    break;
                }

                // Check level completion
                state.enemiesRemaining = enemies.filter(e => e.alive).length;
                state.deepOnesRemaining = deepOnes.filter(d => d.alive).length;

                if (state.enemiesRemaining === 0 && state.enemiesSpawnedThisLevel > 0 && monolith && monolith.hp > 0) {
                    // Calculate end-of-level bonus
                    const bonus = calculateBonus(
                        state.deepOnesRemaining,
                        Math.round(monolith.hp / monolith.maxHP * 100)
                    );
                    state.score += bonus;
                    state.transitionTimer = TIMING.levelTransitionFrames;
                    state.bombFlashTimer = 0; // clear bomb flash overlay
                    state.levelAnnounce = false; // show completion screen
                    playSound('levelComplete');
                    setState('LEVEL_TRANSITION');
                }
                break;

            case 'PAUSED':
                // ── Resume check (Task 6.5) ──
                if (input.pause) {
                    setState('PLAYING');
                    // Adjust lastTime to exclude paused duration
                    const pausedDuration = performance.now() - state.pauseStartTime;
                    state.lastTime += pausedDuration;
                    return;
                }
                // Mute toggle still works while paused
                if (input.mute) {
                    state.muted = !state.muted;
                    updateMute();
                }
                // All other game logic frozen — do nothing
                break;

            case 'DEATH_PAUSE':
                // Update particles so death explosion is visible
                particlePool.forEach((p) => {
                    p.update(dt);
                    if (!p.alive) particlePool.release(p);
                });

                // Count down death timer, then respawn or game over
                state.deathTimer -= dt;
                if (state.deathTimer <= 0) {
                    if (state.lives > 0) {
                        // Respawn player
                        if (player) {
                            const spawnPos = findSafeSpawnPosition(
                                player.x, player.y, enemies,
                                SPAWN_CFG.minDistFromRespawn, WORLD_W
                            );
                            player.x = spawnPos.x;
                            player.y = spawnPos.y;
                            player.vx = 0;
                            player.vy = 0;
                            player.alive = true;
                            player.invincibilityTimer = PLAYER_CFG.invincibilityDuration;
                            player.isDashing = false;
                            player.dashTimer = 0;
                            player.dashCooldownTimer = 0;
                            player.shotCooldownTimer = 0;
                            player.fireBuffered = false;
                        }
                        setState('PLAYING');
                    } else {
                        state.lossReason = 'player_death';
                        playSound('gameOver');
                        stopAllLoops();
                        setState('GAME_OVER');
                    }
                }
                break;

            case 'LEVEL_TRANSITION':
                state.transitionTimer -= dt;
                if (state.transitionTimer < (state.levelAnnounce ? 90 : TIMING.levelTransitionFrames - 30)) {
                    if (input.fire || input.bomb || input.dash) {
                        state.transitionTimer = 0;
                    }
                }
                if (state.transitionTimer <= 0) {
                    if (state.levelAnnounce) {
                        // Level announcement done — start playing
                        state.levelAnnounce = false;
                        setState('PLAYING');
                    } else {
                        // Level complete — advance to next
                        state.level++;
                        state.stats.levelsCompleted++;
                        state.bombs = Math.min(state.bombs + BOMB_CFG.earnPerLevel, BOMB_CFG.maxCount);
                        initLevel(state.level);
                        playSound('levelBegin');
                        // Show level announcement for next level
                        state.levelAnnounce = true;
                        state.transitionTimer = 150;
                    }
                }
                break;

            case 'GAME_OVER':
                // Update high score
                if (state.score > state.highScore) {
                    state.highScore = state.score;
                    try {
                        localStorage.setItem(AUDIO_CFG.highScoreKey, String(state.highScore));
                    } catch (e) {
                        // localStorage unavailable — silent fail
                    }
                }
                // Check for restart input — restart game immediately
                if (input.fire || input.bomb || input.dash) {
                    state.score = 0;
                    state.level = 1;
                    state.lives = PLAYER_CFG.startLives;
                    state.bombs = BOMB_CFG.startCount;
                    state.comboMultiplier = 1;
                    state.comboTimer = 0;
                    state.lossReason = null;
                    state.nextExtraLifeScore = SCORE_CFG.extraLifeInterval;
                    state.damageVignetteTimer = 0;
                    state.bombFlashTimer = 0;
                    state.stats.levelsCompleted = 0;
                    state.stats.enemiesDestroyed = 0;
                    state.stats.deepOnesSaved = 0;
                    state.stats.maxCombo = 0;
                    state.stats.startTime = Date.now();
                    generateBackground();
                    initLevel(state.level);
                    playSound('levelBegin');
                    startLoop('music', musicGain);
                    startLoop('ambient', ambientGain);
                    // Show level announcement
                    state.levelAnnounce = true;
                    state.transitionTimer = 150;
                    state.mode = 'LEVEL_TRANSITION';
                }
                // Q key — return to title screen
                if (input.quit) {
                    stopAllLoops();
                    state.attractMode = false;
                    state.attractPhase = 'title';
                    state.attractTimer = 480;
                    state.mode = 'START_SCREEN';
                }
                break;
        }
    }

    // ── Render Pipeline ────────────────────────────────────────

    function render() {
        ctx.fillStyle = '#050a14';
        ctx.fillRect(0, 0, W, H);
        switch (state.mode) {
            case 'START_SCREEN':
                if (state.attractMode && state.attractPhase === 'demo') {
                    renderGameplay();
                    // Overlay prompt
                    const blink = Math.floor(Date.now() / 500) % 2 === 0;
                    if (blink) {
                        drawTextCenter('PRESS FIRE TO START', H / 2 + 90, '#ffeb3b');
                    }
                } else {
                    renderStartScreen();
                }
                break;
            case 'PLAYING': case 'DEATH_PAUSE': renderGameplay(); break;
            case 'PAUSED': renderGameplay(); renderPauseOverlay(); break;
            case 'LEVEL_TRANSITION': renderGameplay(); renderLevelTransition(); break;
            case 'GAME_OVER': renderGameOver(); break;
        }
    }

    function renderStartScreen() {
        // Title background image (full canvas)
        const bgImg = assets.title_bg;
        if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
            ctx.drawImage(bgImg, 0, 0, W, H);
        } else {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0a1628'); grad.addColorStop(0.3, '#0d1f3c'); grad.addColorStop(1, '#061018');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
        }

        // Title logo (scaled down to fit, with smoothing)
        const logoImg = assets.title_logo;
        if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            const maxW = W - 40;
            const maxH = H / 2 - 10;
            const scale = Math.min(maxW / logoImg.naturalWidth, maxH / logoImg.naturalHeight);
            const logoW = logoImg.naturalWidth * scale;
            const logoH = logoImg.naturalHeight * scale;
            ctx.drawImage(logoImg, (W - logoW) / 2, 10, logoW, logoH);
            ctx.imageSmoothingEnabled = false;
        }

        // Subtitle
        drawTextCenter('LOVECRAFT ARCADE VOLUME 3', H / 2 + 15, '#4db6ac');

        // Controls
        drawTextCenter('ARROWS/WASD - MOVE', H / 2 + 40, '#78909c');
        drawTextCenter('SPACE/Z - FIRE  X/B - BOMB', H / 2 + 52, '#78909c');
        drawTextCenter('SHIFT/C - DASH  ESC/P - PAUSE', H / 2 + 64, '#78909c');

        // Start prompt
        const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        drawTextCenter('PRESS FIRE TO START', H / 2 + 90, '#ffeb3b');
        ctx.globalAlpha = 1;

        // High score
        if (state.highScore > 0) {
            drawTextCenter('HIGH SCORE: ' + state.highScore, H / 2 + 110, '#ff8a65');
        }
    }

    function renderGameplay() {
        const shX = camera.shakeX, shY = camera.shakeY;
        // Far parallax gradient
        const farGrad = ctx.createLinearGradient(0, 0, 0, H);
        farGrad.addColorStop(0, '#0a1628'); farGrad.addColorStop(0.15, '#0d1f3c');
        farGrad.addColorStop(0.85, '#081420'); farGrad.addColorStop(1, '#040a10');
        ctx.fillStyle = farGrad; ctx.fillRect(0, 0, W, H);

        // Background panorama (tiles with blended seams)
        const bgImg = assets.background;
        if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
            const bgW = bgImg.naturalWidth;  // 405
            const bgH = bgImg.naturalHeight; // 270
            const blendW = 40; // pixels of gradient blend at each seam
            // Scroll at parallax rate (slower than camera)
            const scrollX = camera.x * PARALLAX.farSpeedRatio;
            // Calculate starting tile offset
            const startOffset = -(scrollX % bgW);
            // Draw enough tiles to cover viewport + blend zone
            ctx.globalAlpha = 0.6; // blend with gradient behind
            for (let tileX = startOffset - bgW; tileX < W + bgW; tileX += bgW) {
                ctx.drawImage(bgImg, tileX + shX, shY, bgW, bgH);
            }
            // Draw blend patches at seams to hide repetition
            for (let tileX = startOffset - bgW; tileX < W + bgW; tileX += bgW) {
                const seamX = tileX + bgW; // right edge of this tile
                // Gradient fade: left side of seam fades out, right side fades in
                const grad = ctx.createLinearGradient(seamX - blendW / 2, 0, seamX + blendW / 2, 0);
                grad.addColorStop(0, 'rgba(10, 22, 40, 0)');
                grad.addColorStop(0.5, 'rgba(10, 22, 40, 0.7)');
                grad.addColorStop(1, 'rgba(10, 22, 40, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(seamX - blendW / 2 + shX, shY, blendW, bgH);
            }
            ctx.globalAlpha = 1;
        }

        // Bioluminescent dots (each drifts at its own parallax depth)
        for (let i = 0; i < bgStars.length; i++) {
            const s = bgStars[i];
            // Each dot scrolls at its own parallax rate + slow drift
            const drift = Date.now() * s.driftX;
            let sx = (s.x + drift - camera.x * s.parallax) % WORLD_W;
            if (sx < 0) sx += WORLD_W; sx = sx % (W * 2) - W * 0.5;
            const vertDrift = Math.sin(Date.now() * s.driftY + s.phase) * 3;
            const sy = worldToScreenY(s.y + vertDrift);
            if (sx < -5 || sx > W + 5 || sy < -5 || sy > H + 5) continue;
            const glow = Math.sin(causticPhase * s.speed * 50 + s.phase) * 0.3 + 0.7;
            ctx.globalAlpha = glow * 0.5;
            ctx.fillStyle = 'hsl(' + s.hue + ', 60%, 60%)';
            ctx.beginPath(); ctx.arc(sx + shX, sy + shY, s.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Fish schools swimming in background
        const fishTime = Date.now() * 0.001;
        for (let s = 0; s < fishSchools.length; s++) {
            const school = fishSchools[s];
            // School position moves over time in its swimming direction
            const schoolX = school.baseX + school.dir * fishTime * school.speed * 60;
            // Apply parallax scrolling
            let screenBaseX = (schoolX - camera.x * school.parallax) % WORLD_W;
            if (screenBaseX < 0) screenBaseX += WORLD_W;
            screenBaseX = screenBaseX % (W * 3) - W;
            const screenBaseY = worldToScreenY(school.baseY);
            // Skip if school is off screen
            if (screenBaseX < -60 || screenBaseX > W + 60 || screenBaseY < -30 || screenBaseY > H + 30) continue;
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = 'hsl(' + school.hue + ', 40%, 45%)';
            for (let f = 0; f < school.fish.length; f++) {
                const fish = school.fish[f];
                const wobbleX = Math.sin(fishTime * fish.wobbleSpeed * 10 + fish.wobblePhase) * 2;
                const wobbleY = Math.cos(fishTime * fish.wobbleSpeed * 8 + fish.wobblePhase) * 1.5;
                const fx = screenBaseX + fish.offsetX + wobbleX + shX;
                const fy = screenBaseY + fish.offsetY + wobbleY + shY;
                // Draw tiny fish shape (diamond/arrow)
                ctx.beginPath();
                if (school.dir > 0) {
                    ctx.moveTo(fx + fish.size * 2, fy);
                    ctx.lineTo(fx, fy - fish.size * 0.6);
                    ctx.lineTo(fx - fish.size, fy);
                    ctx.lineTo(fx, fy + fish.size * 0.6);
                } else {
                    ctx.moveTo(fx - fish.size * 2, fy);
                    ctx.lineTo(fx, fy - fish.size * 0.6);
                    ctx.lineTo(fx + fish.size, fy);
                    ctx.lineTo(fx, fy + fish.size * 0.6);
                }
                ctx.fill();
            }
        }
        ctx.globalAlpha = 1;

        // Water surface
        const surfaceY = worldToScreenY(SEA_SURFACE_Y) + shY;
        ctx.fillStyle = '#1a3a5c'; ctx.fillRect(0, 0, W, Math.max(0, surfaceY));
        ctx.strokeStyle = 'rgba(79, 195, 247, 0.4)'; ctx.lineWidth = 2; ctx.beginPath();
        for (let wx = 0; wx < W; wx += 4) {
            const wy = surfaceY + Math.sin(causticPhase * 2 + wx * 0.04) * 2;
            if (wx === 0) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
        }
        ctx.stroke();
        // Sea bottom — rolling terrain
        const terrainColor1 = '#1a3a2a';
        const terrainColor2 = '#0a1810';
        ctx.fillStyle = terrainColor2;
        // Draw terrain as a filled polygon
        ctx.beginPath();
        ctx.moveTo(-5, H + 10);
        for (let screenX = -TERRAIN_RESOLUTION; screenX <= W + TERRAIN_RESOLUTION; screenX += TERRAIN_RESOLUTION) {
            const worldX = camera.x + screenX;
            const terrainY = getTerrainHeight(worldX);
            const sy = Math.round(worldToScreenY(terrainY) + shY);
            ctx.lineTo(Math.round(screenX + shX), sy);
        }
        ctx.lineTo(W + 10, H + 10);
        ctx.closePath();
        ctx.fill();
        // Lighter top edge
        ctx.strokeStyle = terrainColor1;
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let screenX = -TERRAIN_RESOLUTION; screenX <= W + TERRAIN_RESOLUTION; screenX += TERRAIN_RESOLUTION) {
            const worldX = camera.x + screenX;
            const terrainY = getTerrainHeight(worldX);
            const sy = Math.round(worldToScreenY(terrainY) + shY);
            if (screenX <= 0) ctx.moveTo(Math.round(screenX + shX), sy);
            else ctx.lineTo(Math.round(screenX + shX), sy);
        }
        ctx.stroke();
        // Tentacle obstacles (rise from behind ocean floor, with wavy distortion)
        const tentImg = assets.tentacle;
        const waveTime = Date.now() * 0.002; // global wave time
        const frameDtMs = state.dt * 16.667; // approximate ms this frame
        for (let i = 0; i < tentacles.length; i++) {
            const t = tentacles[i];
            const tx = worldToScreenX(t.x);
            if (tx + t.w < -30 || tx > W + 30) continue;

            // Update rise state
            if (t.riseDelay > 0) {
                t.riseDelay -= frameDtMs;
            } else if (t.pauseTimer > 0) {
                t.pauseTimer -= frameDtMs;
            } else {
                t.riseAmount += t.riseDir * TENTACLE_CFG.riseSpeed * frameDtMs;
                if (t.riseAmount >= 1) {
                    t.riseAmount = 1;
                    t.riseDir = -1;
                    t.pauseTimer = TENTACLE_CFG.risePause;
                } else if (t.riseAmount <= 0) {
                    t.riseAmount = 0;
                    t.riseDir = 1;
                    t.pauseTimer = TENTACLE_CFG.risePause * 0.5;
                }
            }

            if (t.riseAmount <= 0) continue; // fully hidden

            // Visible height = total height × riseAmount
            const visibleH = t.h * t.riseAmount;
            // Top of visible portion (rises above terrain as riseAmount increases)
            const topY = t.baseY - visibleH;
            const ty = worldToScreenY(topY);
            // Clip: bottom of tentacle is always at terrain level
            const terrainScreenY = worldToScreenY(t.baseY);

            if (tentImg && tentImg.complete && tentImg.naturalWidth > 0) {
                const segs = TENTACLE_CFG.waveSegments;
                const segH = visibleH / segs;
                // Only draw the top portion of the sprite (the visible part)
                const srcStartFrac = 1 - t.riseAmount; // start from this fraction into sprite
                for (let s = 0; s < segs; s++) {
                    const segY = ty + s * segH;
                    // Don't draw below terrain
                    if (segY + shY > terrainScreenY) break;
                    const waveFactor = Math.pow(1 - (s / segs), 1.5);
                    const waveOffset = Math.sin(waveTime * TENTACLE_CFG.waveSpeed + t.phase + s * 0.8) * TENTACLE_CFG.waveAmplitude * waveFactor;
                    const srcY = (srcStartFrac + (s / segs) * t.riseAmount) * tentImg.naturalHeight;
                    const srcH = (t.riseAmount / segs) * tentImg.naturalHeight;
                    ctx.drawImage(
                        tentImg,
                        0, Math.floor(srcY), tentImg.naturalWidth, Math.ceil(srcH),
                        tx + shX + waveOffset, segY + shY, t.w, segH + 1
                    );
                }
            } else {
                // Fallback: tapered green shape
                ctx.fillStyle = '#1a3a2a';
                ctx.beginPath();
                const baseW = t.w;
                const tipW = t.w * 0.3;
                const segs = TENTACLE_CFG.waveSegments;
                for (let s = 0; s <= segs; s++) {
                    const frac = s / segs;
                    const segY = ty + frac * visibleH;
                    if (segY + shY > terrainScreenY) break;
                    const waveFactor = Math.pow(1 - frac, 1.5);
                    const waveOffset = Math.sin(waveTime * TENTACLE_CFG.waveSpeed + t.phase + s * 0.8) * TENTACLE_CFG.waveAmplitude * waveFactor;
                    const w = tipW + (baseW - tipW) * frac;
                    const cx = tx + shX + t.w / 2 + waveOffset;
                    if (s === 0) ctx.moveTo(cx - w / 2, segY + shY);
                    else ctx.lineTo(cx - w / 2, segY + shY);
                }
                for (let s = segs; s >= 0; s--) {
                    const frac = s / segs;
                    const segY = ty + frac * visibleH;
                    if (segY + shY > terrainScreenY) continue;
                    const waveFactor = Math.pow(1 - frac, 1.5);
                    const waveOffset = Math.sin(waveTime * TENTACLE_CFG.waveSpeed + t.phase + s * 0.8) * TENTACLE_CFG.waveAmplitude * waveFactor;
                    const w = tipW + (baseW - tipW) * frac;
                    const cx = tx + shX + t.w / 2 + waveOffset;
                    ctx.lineTo(cx + w / 2, segY + shY);
                }
                ctx.closePath();
                ctx.fill();
            }
        }
        // Ground features (rendered at correct aspect ratio from source image)
        for (let i = 0; i < groundFeatures.length; i++) {
            const f = groundFeatures[i];
            const gfKey = 'ground_' + f.type;
            const gfImg = assets[gfKey];
            let drawW = f.w;
            let drawH = f.h;
            // Use actual image aspect ratio if loaded
            if (gfImg && gfImg.complete && gfImg.naturalWidth > 0) {
                const aspect = gfImg.naturalWidth / gfImg.naturalHeight;
                drawH = drawW / aspect;
            }
            const fx = worldToScreenX(f.x);
            // Position bottom edge at terrain level (recalculate y from terrain)
            const terrainY = getTerrainHeight(f.x);
            const fy = worldToScreenY(terrainY - drawH);
            if (fx + drawW < -50 || fx > W + 50) continue;
            if (gfImg && gfImg.complete && gfImg.naturalWidth > 0) {
                ctx.drawImage(gfImg, fx + shX, fy + shY, drawW, drawH);
            } else {
                ctx.fillStyle = f.color;
                ctx.fillRect(fx + shX, fy + shY, drawW, drawH);
            }
        }
        // Bubbles
        for (let i = 0; i < bubbles.length; i++) {
            const b = bubbles[i], bx = worldToScreenX(b.x), by = worldToScreenY(b.y);
            if (bx < -5 || bx > W + 5) continue;
            ctx.globalAlpha = b.alpha; ctx.fillStyle = 'rgba(120, 200, 255, 0.3)';
            ctx.beginPath(); ctx.arc(bx + shX, by + shY, b.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        // Monolith
        if (monolith && monolith.alive) {
            const mx = worldToScreenX(monolith.x), my = worldToScreenY(monolith.y);
            const monoImg = assets.monolith;
            if (monoImg && monoImg.complete && monoImg.naturalWidth > 0) {
                // Glow outline: green when healthy, red when damaged
                const hpPct = monolith.hp / monolith.maxHP;
                if (hpPct >= 0.5) {
                    // Green healthy glow
                    const glowAlpha = 0.25 + Math.sin(Date.now() * 0.004) * 0.1;
                    ctx.save();
                    ctx.globalAlpha = glowAlpha;
                    ctx.shadowColor = '#44ff66';
                    ctx.shadowBlur = 8;
                    const offsets = [[-2,0],[2,0],[0,-2],[0,2]];
                    for (let o = 0; o < offsets.length; o++) {
                        ctx.drawImage(monoImg, mx + shX + offsets[o][0], my + shY + offsets[o][1], monolith.w, monolith.h);
                    }
                    ctx.shadowBlur = 0;
                    ctx.restore();
                } else {
                    // Red damage glow
                    const glowAlpha = 0.3 + Math.sin(Date.now() * 0.008) * 0.2;
                    ctx.save();
                    ctx.globalAlpha = glowAlpha;
                    ctx.shadowColor = '#ff4444';
                    ctx.shadowBlur = 10;
                    const offsets = [[-2,0],[2,0],[0,-2],[0,2]];
                    for (let o = 0; o < offsets.length; o++) {
                        ctx.drawImage(monoImg, mx + shX + offsets[o][0], my + shY + offsets[o][1], monolith.w, monolith.h);
                    }
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
                // Draw monolith at full opacity always
                ctx.globalAlpha = 1;
                ctx.drawImage(monoImg, mx + shX, my + shY, monolith.w, monolith.h);
            } else {
                ctx.globalAlpha = 1;
                ctx.fillStyle = monolith.damageState === 0 ? '#607d8b' : monolith.damageState === 1 ? '#78909c' : '#90a4ae';
                ctx.fillRect(mx + shX, my + shY, monolith.w, monolith.h);
            }
        }
        // Deep Ones (face their travel direction)
        for (let i = 0; i < deepOnes.length; i++) {
            const d = deepOnes[i]; if (!d.alive) continue;
            const doImg = assets.deep_one;
            const dx = worldToScreenX(d.x), dy = worldToScreenY(d.y);
            if (d.beingAbducted && Math.floor(Date.now() / 200) % 2 === 0) {
                ctx.globalAlpha = 0.6;
            }
            // Determine facing from wanderDir or velocity
            const facingRight = d.state === 'WANDERING' ? d.wanderDir > 0 :
                                d.vx !== undefined ? d.vx >= 0 : true;
            if (doImg && doImg.complete && doImg.naturalWidth > 0) {
                ctx.save();
                if (!facingRight) {
                    ctx.translate(dx + shX + d.w, dy + shY);
                    ctx.scale(-1, 1);
                    ctx.drawImage(doImg, 0, 0, d.w, d.h);
                } else {
                    ctx.drawImage(doImg, dx + shX, dy + shY, d.w, d.h);
                }
                ctx.restore();
            } else {
                let color = d.state === 'REPAIRING' ? '#81c784' : d.beingAbducted && Math.floor(Date.now() / 200) % 2 === 0 ? '#ffeb3b' : '#66bb6a';
                drawEntity(d, color);
            }
            ctx.globalAlpha = 1;
        }
        // Enemies
        const eColors = { abductor: '#ab47bc', crab: '#ef5350', pursuer: '#ff7043', drifter: '#7e57c2', mutant: '#e53935' };
        for (let i = 0; i < enemies.length; i++) { const e = enemies[i]; if (e.alive) drawEnemy(e, eColors[e.type] || '#ef5350'); }
        // Player
        drawPlayer();
        // Player projectiles (with trail effect and golden glow)
        playerProjectilePool.forEach((p) => {
            const px = worldToScreenX(p.x), py = worldToScreenY(p.y);
            const ppImg = assets.player_projectile;
            const cx = px + shX + p.w / 2;
            const cy = py + shY + p.h / 2;
            // Hazy golden glow (radial gradient)
            const glowRadius = p.w * 1.5;
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
            glow.addColorStop(0, 'rgba(255, 204, 0, 0.4)');
            glow.addColorStop(0.4, 'rgba(255, 180, 0, 0.15)');
            glow.addColorStop(1, 'rgba(255, 150, 0, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(cx - glowRadius, cy - glowRadius, glowRadius * 2, glowRadius * 2);
            // Draw trail (fading copies behind the projectile)
            const trailDir = p.vx > 0 ? -1 : 1;
            for (let t = 1; t <= 4; t++) {
                ctx.globalAlpha = 0.3 / t;
                ctx.fillStyle = '#ffd54f';
                ctx.fillRect(px + shX + trailDir * t * 6, py + shY + 1, p.w - 2, p.h - 2);
            }
            ctx.globalAlpha = 1;
            // Draw projectile
            if (ppImg && ppImg.complete && ppImg.naturalWidth > 0) {
                ctx.drawImage(ppImg, px + shX, py + shY, p.w, p.h);
            } else {
                ctx.fillStyle = '#fff176';
                ctx.fillRect(px + shX, py + shY, p.w, p.h);
            }
            // Bright leading edge
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = '#ffffff';
            const leadX = p.vx > 0 ? px + shX + p.w - 2 : px + shX;
            ctx.fillRect(leadX, py + shY, 2, p.h);
            ctx.globalAlpha = 1;
        });
        // Enemy projectiles
        enemyProjectilePool.forEach((p) => {
            const px = worldToScreenX(p.x), py = worldToScreenY(p.y);
            const epImg = assets.enemy_projectile;
            ctx.globalAlpha = 1;
            if (epImg && epImg.complete && epImg.naturalWidth > 0) {
                // Flip horizontally if moving left
                if (p.vx < 0) {
                    ctx.save();
                    ctx.translate(px + shX + p.w, py + shY);
                    ctx.scale(-1, 1);
                    ctx.drawImage(epImg, 0, 0, p.w, p.h);
                    ctx.restore();
                } else {
                    ctx.drawImage(epImg, px + shX, py + shY, p.w, p.h);
                }
            } else {
                const cx = px + shX + p.w / 2;
                const cy = py + shY + p.h / 2;
                ctx.fillStyle = '#ff4400';
                ctx.beginPath();
                ctx.arc(cx, cy, p.w / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.arc(cx, cy, p.w / 4, 0, Math.PI * 2);
                ctx.fill();
            }
        });
        // Mines (Drifter bombs) — pulsing green glow
        for (let i = 0; i < mines.length; i++) {
            const m = mines[i];
            const mx = worldToScreenX(m.x), my = worldToScreenY(m.y);
            if (mx + MINE_CFG.w < -10 || mx > W + 10) continue;
            const pulse = 0.4 + Math.sin(Date.now() * MINE_CFG.pulseSpeed + i * 2) * 0.3;
            // Outer glow
            ctx.globalAlpha = pulse * 0.5;
            ctx.fillStyle = '#44ff66';
            ctx.beginPath();
            ctx.arc(mx + shX + MINE_CFG.w / 2, my + shY + MINE_CFG.h / 2, MINE_CFG.w * 0.8, 0, Math.PI * 2);
            ctx.fill();
            // Core
            ctx.globalAlpha = pulse;
            ctx.fillStyle = '#88ffaa';
            ctx.beginPath();
            ctx.arc(mx + shX + MINE_CFG.w / 2, my + shY + MINE_CFG.h / 2, MINE_CFG.w * 0.4, 0, Math.PI * 2);
            ctx.fill();
            // Bright center pixel
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(mx + shX + MINE_CFG.w / 2 - 1, my + shY + MINE_CFG.h / 2 - 1, 2, 2);
        }
        ctx.globalAlpha = 1;
        // Particles
        particlePool.forEach((p) => {
            ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            const pSize = Math.max(1, p.scale * (0.5 + p.alpha * 0.5));
            ctx.fillRect(worldToScreenX(p.x) + shX, worldToScreenY(p.y) + shY, pSize, pSize);
        });
        ctx.globalAlpha = 1;
        // Damage vignette
        if (state.damageVignetteTimer > 0) {
            const va = Math.min(0.4, state.damageVignetteTimer / TIMING.damageVignetteFrames * 0.4);
            ctx.fillStyle = 'rgba(200, 30, 30, ' + va + ')';
            ctx.fillRect(0, 0, W, 6); ctx.fillRect(0, H - 6, W, 6); ctx.fillRect(0, 0, 6, H); ctx.fillRect(W - 6, 0, 6, H);
        }
        // Bomb flash
        if (state.bombFlashTimer > 0) {
            ctx.fillStyle = 'rgba(255, 255, 255, ' + Math.min(0.5, state.bombFlashTimer / TIMING.bombFlashFrames * 0.5) + ')';
            ctx.fillRect(0, 0, W, H);
        }
        // Monolith / Deep One alerts
        if (state.monolithAlertTimer > 0 || state.deepOneAlertTimer > 0) {
            const blink = Math.floor(Date.now() / 300) % 2 === 0;
            if (state.monolithAlertTimer > 0 && state.deepOneAlertTimer > 0) {
                // Both active — alternate between them
                const altBlink = Math.floor(Date.now() / 600) % 2 === 0;
                if (blink) {
                    if (altBlink) {
                        const alertAlpha = Math.min(1, state.monolithAlertTimer / 30);
                        ctx.globalAlpha = alertAlpha * 0.8;
                        drawTextCenter('MONOLITH ATTACKED', H / 2 - 40, '#ff4444');
                    } else {
                        const alertAlpha = Math.min(1, state.deepOneAlertTimer / 30);
                        ctx.globalAlpha = alertAlpha * 0.8;
                        drawTextCenter('DEEP ONE ABDUCTED', H / 2 - 40, '#4fc3f7');
                    }
                    ctx.globalAlpha = 1;
                }
            } else if (state.monolithAlertTimer > 0) {
                const alertAlpha = Math.min(1, state.monolithAlertTimer / 30);
                if (blink) {
                    ctx.globalAlpha = alertAlpha * 0.8;
                    drawTextCenter('MONOLITH ATTACKED', H / 2 - 40, '#ff4444');
                    ctx.globalAlpha = 1;
                }
            } else {
                const alertAlpha = Math.min(1, state.deepOneAlertTimer / 30);
                if (blink) {
                    ctx.globalAlpha = alertAlpha * 0.8;
                    drawTextCenter('DEEP ONE ABDUCTED', H / 2 - 40, '#4fc3f7');
                    ctx.globalAlpha = 1;
                }
            }
        }
        // HUD
        renderHUD();
        // Mini-map
        renderMiniMap();
        // Death overlay
        if (state.mode === 'DEATH_PAUSE') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.fillRect(0, 0, W, H);
            drawTextLarge('DAGON FALLS', H / 2 - 14, '#ef5350');
            drawTextCenter(state.lives > 0 ? 'LIVES REMAINING: ' + state.lives : 'NO LIVES REMAINING', H / 2 + 12, '#b0bec5');
        }
    }

    function renderHUD() {
        drawText('SCORE ' + state.score, 4, 16, '#e0e0e0');
        drawText('LV ' + state.level, 4, 26, '#4db6ac');
        // Lives
        ctx.fillStyle = '#4fc3f7';
        for (let i = 0; i < state.lives; i++) ctx.fillRect(80 + i * 10, 17, 6, 6);
        // Bombs
        ctx.fillStyle = '#ffab40';
        for (let i = 0; i < state.bombs; i++) { ctx.beginPath(); ctx.arc(150 + i * 10, 20, 3, 0, Math.PI * 2); ctx.fill(); }
        // Combo
        if (state.comboMultiplier > 1) { drawText('X' + state.comboMultiplier, 210, 16, '#ffeb3b'); }
        // Dash meter
        if (player) {
            const dp = player.dashCooldownTimer > 0 ? 1 - player.dashCooldownTimer / DASH_CFG.cooldown : 1;
            ctx.fillStyle = '#263238'; ctx.fillRect(300, 17, 30, 5);
            ctx.fillStyle = dp >= 1 ? '#4fc3f7' : '#37474f'; ctx.fillRect(300, 17, 30 * dp, 5);
            drawText('DASH', 300, 24, '#78909c');
        }
        // Monolith health bar
        if (monolith) {
            const hp = monolith.hp / monolith.maxHP, bw = 60, bx = W - bw - 4;
            ctx.fillStyle = '#263238'; ctx.fillRect(bx, 17, bw, 6);
            ctx.fillStyle = hp > 0.66 ? '#66bb6a' : hp > 0.33 ? '#ffa726' : '#ef5350';
            ctx.fillRect(bx, 17, bw * hp, 6);
            ctx.strokeStyle = '#455a64'; ctx.lineWidth = 1; ctx.strokeRect(bx, 17, bw, 6);
            drawText('MONOLITH', bx, 25, '#b0bec5');
        }
    }

    function renderMiniMap() {
        const mapH = 12, scale = W / WORLD_W;
        ctx.fillStyle = 'rgba(0, 10, 20, 0.75)'; ctx.fillRect(0, 0, W, mapH);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 1;
        ctx.strokeRect(wrapPosition(camera.x, WORLD_W) * scale, 0, W * scale, mapH);
        if (monolith && monolith.alive) {
            const att = enemies.some(e => e.alive && e.type === 'crab' && e.state === 'ATTACKING');
            ctx.fillStyle = att && Math.floor(Date.now() / 300) % 2 === 0 ? '#ff4444' : '#ffffff';
            ctx.fillRect(monolith.x * scale, 2, 3, mapH - 4);
        }
        for (let i = 0; i < deepOnes.length; i++) {
            const d = deepOnes[i]; if (!d.alive) continue;
            ctx.fillStyle = d.beingAbducted && Math.floor(Date.now() / 200) % 2 === 0 ? '#ffeb3b' : '#66bb6a';
            ctx.fillRect(d.x * scale, 4, 2, 4);
        }
        ctx.fillStyle = '#ef5350';
        for (let i = 0; i < enemies.length; i++) if (enemies[i].alive) ctx.fillRect(enemies[i].x * scale, 3, 2, 5);
        if (player && player.alive) { ctx.fillStyle = '#4fc3f7'; ctx.fillRect(player.x * scale - 1, 2, 4, mapH - 4); }
    }

    function renderPauseOverlay() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.65)'; ctx.fillRect(0, 0, W, H);
        drawTextLarge('PAUSED', H / 2 - 20, '#4fc3f7');
        drawTextCenter('PRESS ESCAPE OR P TO RESUME', H / 2 + 10, '#b0bec5');
        drawTextCenter('M - TOGGLE MUTE' + (state.muted ? ' .MUTED.' : ''), H / 2 + 24, '#b0bec5');
    }

    function renderLevelTransition() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(0, 0, W, H);
        if (state.levelAnnounce) {
            // Level start announcement
            drawTextLarge('LEVEL ' + state.level, H / 2 - 20, '#4fc3f7');
            const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
            ctx.globalAlpha = pulse;
            drawTextCenter('GET READY', H / 2 + 20, '#ffeb3b');
            ctx.globalAlpha = 1;
        } else {
            // Level complete summary
            drawTextLarge('LEVEL ' + state.level + ' COMPLETE', H / 2 - 40, '#4fc3f7');
            drawTextCenter('DEEP ONES SAVED: ' + state.deepOnesRemaining + '/' + DEEP_ONE_CFG.count, H / 2 - 10, '#80cbc4');
            if (monolith) drawTextCenter('MONOLITH: ' + Math.round(monolith.hp / monolith.maxHP * 100) + '%', H / 2 + 4, '#80cbc4');
            drawTextCenter('PRESS FIRE TO CONTINUE', H / 2 + 28, '#b0bec5');
        }
    }

    function renderGameOver() {
        // Game over background image
        const goImg = assets.gameover_bg;
        if (goImg && goImg.complete && goImg.naturalWidth > 0) {
            ctx.drawImage(goImg, 0, 0, W, H);
        } else {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#1a0a0a'); grad.addColorStop(1, '#0a0505');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
        }

        drawTextLarge(state.lossReason === 'monolith_destroyed' ? 'THE MONOLITH HAS FALLEN' : 'DAGON HAS FALLEN', H / 2 - 70, '#ef5350');
        drawTextCenter('FINAL SCORE: ' + state.score, H / 2 - 40, '#ffffff');
        if (state.score >= state.highScore && state.score > 0) {
            drawTextCenter('NEW HIGH SCORE!', H / 2 - 26, '#ffeb3b');
        } else {
            drawTextCenter('HIGH SCORE: ' + state.highScore, H / 2 - 26, '#ff8a65');
        }
        drawTextCenter('LEVELS: ' + state.stats.levelsCompleted + '  ENEMIES: ' + state.stats.enemiesDestroyed, H / 2, '#b0bec5');
        drawTextCenter('SAVED: ' + state.stats.deepOnesSaved + '  MAX COMBO: X' + state.stats.maxCombo, H / 2 + 12, '#b0bec5');

        const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        drawTextCenter('PRESS FIRE TO RESTART', H / 2 + 50, '#ffeb3b');
        ctx.globalAlpha = 1;
        drawTextCenter('PRESS Q FOR TITLE', H / 2 + 66, '#78909c');
    }

    /**
     * Collision detection. Checks all relevant entity pairs using AABB.
     */
    function checkCollisions() {
        // 1. Player projectiles vs enemies
        playerProjectilePool.forEach((proj) => {
            if (!proj.alive) return;
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (!e.alive) continue;
                if (aabb(proj.getHitbox(), e.getHitbox())) {
                    proj.kill();
                    playerProjectilePool.release(proj);
                    damageEnemy(e);
                    break;
                }
            }
        });

        // 2. Enemy projectiles vs player
        if (player && player.alive && player.invincibilityTimer <= 0 && !player.isDashing) {
            enemyProjectilePool.forEach((proj) => {
                if (!proj.alive) return;
                if (aabb(proj.getHitbox(), player.getHitbox())) {
                    proj.kill();
                    enemyProjectilePool.release(proj);
                    playerHit();
                }
            });
        }

        // 3. Enemy bodies vs player
        if (player && player.alive && player.invincibilityTimer <= 0 && !player.isDashing) {
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (!e.alive) continue;
                if (aabb(e.getHitbox(), player.getHitbox())) {
                    playerHit();
                    break;
                }
            }
        }

        // 3b. Mines vs player
        if (player && player.alive && player.invincibilityTimer <= 0 && !player.isDashing) {
            const playerHB = player.getHitbox();
            for (let i = mines.length - 1; i >= 0; i--) {
                const m = mines[i];
                const mineHB = { x: m.x + MINE_CFG.hb.x, y: m.y + MINE_CFG.hb.y, w: MINE_CFG.hb.w, h: MINE_CFG.hb.h };
                if (aabb(mineHB, playerHB)) {
                    // Mine explodes and damages player
                    spawnExplosion(m.x + MINE_CFG.w / 2, m.y + MINE_CFG.h / 2, '#44ff66', 10);
                    playSound('mineDetonate');
                    mines.splice(i, 1);
                    playerHit();
                    break;
                }
            }
        }

        // 3c. Player projectiles vs mines (player can shoot mines to destroy them)
        playerProjectilePool.forEach((proj) => {
            if (!proj.alive) return;
            const projHB = proj.getHitbox();
            for (let i = mines.length - 1; i >= 0; i--) {
                const m = mines[i];
                const mineHB = { x: m.x + MINE_CFG.hb.x, y: m.y + MINE_CFG.hb.y, w: MINE_CFG.hb.w, h: MINE_CFG.hb.h };
                if (aabb(projHB, mineHB)) {
                    spawnExplosion(m.x + MINE_CFG.w / 2, m.y + MINE_CFG.h / 2, '#44ff66', 6);
                    mines.splice(i, 1);
                    proj.kill();
                    playerProjectilePool.release(proj);
                    break;
                }
            }
        });

        // 3d. Tentacles vs player
        if (player && player.alive && player.invincibilityTimer <= 0 && !player.isDashing) {
            const playerHB = player.getHitbox();
            for (let i = 0; i < tentacles.length; i++) {
                const t = tentacles[i];
                if (t.riseAmount <= 0) continue; // hidden, no collision
                const visibleH = t.h * t.riseAmount;
                const topY = t.baseY - visibleH;
                const thb = {
                    x: t.x + (t.w - TENTACLE_CFG.hitboxW) / 2,
                    y: topY,
                    w: TENTACLE_CFG.hitboxW,
                    h: visibleH,
                };
                if (aabb(thb, playerHB)) {
                    playerHit();
                    break;
                }
            }
        }

        // 4. Crabs vs Monolith (handled in Crab.update via proximity, but ensure ATTACKING state)
        // Already handled by Crab FSM — Crabs march to Monolith and switch to ATTACKING

        // 5. Abductors vs Deep Ones
        for (let i = 0; i < enemies.length; i++) {
            const e = enemies[i];
            if (!e.alive || e.type !== 'abductor' || e.state !== 'SEEKING') continue;
            if (!e.target) continue;
            for (let j = 0; j < deepOnes.length; j++) {
                const d = deepOnes[j];
                if (!d.alive || d.targeted || d.beingAbducted) continue;
                if (aabb(e.getHitbox(), d.getHitbox())) {
                    // Abductor grabs this Deep One
                    e.target = d;
                    d.targeted = true;
                    e.state = 'GRABBING';
                    e.grabTimer = 0;
                    break;
                }
            }
        }
    }

    /**
     * Entity cleanup. Removes dead entities from arrays and returns
     * pooled objects.
     */
    function cleanup() {
        for (let i = enemies.length - 1; i >= 0; i--) {
            if (!enemies[i].alive) enemies.splice(i, 1);
        }
        for (let i = deepOnes.length - 1; i >= 0; i--) {
            if (!deepOnes[i].alive) deepOnes.splice(i, 1);
        }
        // Clean up released projectiles
        playerProjectilePool.forEach((p) => {
            if (!p.alive) playerProjectilePool.release(p);
        });
        enemyProjectilePool.forEach((p) => {
            if (!p.alive) enemyProjectilePool.release(p);
        });
        particlePool.forEach((p) => {
            if (!p.alive) particlePool.release(p);
        });
    }

    /**
     * The main game loop. Uses requestAnimationFrame for smooth 60fps.
     * Computes delta-time, polls input, updates game state, and renders.
     * Frame order: input → update → collisions → cleanup → render.
     * Wrapped in try/catch for resilience — requestAnimationFrame is
     * called outside the catch to ensure the loop never stops.
     */
    function gameLoop(now) {
        try {
            state.dt = computeDt(now, state.lastTime);
            state.lastTime = now;

            if (state.mode === 'PLAYING') {
                input.poll();
                update(state.dt);
                checkCollisions();
                cleanup();
            } else if (state.mode === 'PAUSED') {
                input.poll();
                update(state.dt);
            } else {
                input.poll();
                update(state.dt);
            }
            render();
        } catch (err) {
            console.error('Dagon: game loop error', err);
        }
        requestAnimationFrame(gameLoop);
    }

    // ── Initialize and Start ────────────────────────────────────

    /**
     * Load high score from localStorage with validation.
     * Returns 0 on any failure (missing, corrupt, unavailable).
     */
    function loadHighScore() {
        try {
            const raw = localStorage.getItem(AUDIO_CFG.highScoreKey);
            return validateHighScore(raw);
        } catch (e) {
            return 0;
        }
    }

    /**
     * Initialize the game and start the main loop.
     * Sets initial state, loads persisted data, and kicks off
     * the requestAnimationFrame loop.
     */
    function startGame() {
        state.mode = 'START_SCREEN';
        state.highScore = loadHighScore();

        // Load accessibility settings from localStorage
        try {
            const savedAccess = localStorage.getItem(ACCESSIBILITY_CFG.localStorageKey);
            if (savedAccess) {
                const parsed = JSON.parse(savedAccess);
                if (typeof parsed.reduceShake === 'boolean') state.accessibility.reduceShake = parsed.reduceShake;
                if (typeof parsed.highContrastMiniMap === 'boolean') state.accessibility.highContrastMiniMap = parsed.highContrastMiniMap;
            }
        } catch (e) {
            // Defaults already set
        }

        input.initKeyboard();
        input.initGamepad();
        input.initTouch();

        // Generate QR code for tip jar
        try {
            if (typeof qrcode !== 'undefined') {
                const qr = qrcode(0, 'M');
                qr.addData('https://www.paypal.com/donate/?hosted_button_id=HDD77QKGC6XXN');
                qr.make();
                const qrEl = document.getElementById('qr-code');
                if (qrEl) qrEl.innerHTML = qr.createImgTag(3, 0);
            }
        } catch (e) {
            // QR library not loaded — silent fail
        }

        requestAnimationFrame(gameLoop);
    }

    startGame();
    </script>
