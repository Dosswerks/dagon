    <script>
    // ── Canvas & Scaling ────────────────────────────────────────
    const W = 480, H = 270;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // ── Asset Loading ───────────────────────────────────────────
    const assets = {};

    function loadImage(key, src) {
        const img = new Image();
        img.src = src;
        assets[key] = img;
    }

    loadImage('player_1', 'assets/player_1.png');
    loadImage('player_2', 'assets/player_2.png');
    loadImage('abductor_1', 'assets/abductor_1.png');
    loadImage('abductor_2', 'assets/abductor_2.png');
    loadImage('crab_1', 'assets/crab_1.png');
    loadImage('crab_2', 'assets/crab_2.png');
    loadImage('pursuer_1', 'assets/pursuer_1.png');
    loadImage('pursuer_2', 'assets/pursuer_2.png');
    loadImage('drifter_1', 'assets/drifter_1.png');
    loadImage('drifter_2', 'assets/drifter_2.png');
    loadImage('mutant_1', 'assets/mutant_1.png');
    loadImage('mutant_2', 'assets/mutant_2.png');
    loadImage('monolith', 'assets/monolith.png');
    loadImage('deep_one', 'assets/deep-one.png');
    loadImage('ground_house', 'assets/ground-house.png');
    loadImage('ground_ruin', 'assets/ground-ruin.png');
    loadImage('ground_coral', 'assets/ground-coral.png');
    loadImage('ground_rock', 'assets/ground-rock.png');
    loadImage('player_projectile', 'assets/player-projectile.png');
    loadImage('enemy_projectile', 'assets/enemy-projectile.png');
    loadImage('tentacle', 'assets/tentacle.png');
    loadImage('background', 'assets/background.png');
    loadImage('title_logo', 'assets/title-logo.png');
    loadImage('title_bg', 'assets/title-bg.png');
    loadImage('gameover_bg', 'assets/gameover-bg.png');

    // ── Audio System ────────────────────────────────────────────

    let audioCtx = null;
    let masterGain = null;
    let sfxGain = null;
    let musicGain = null;
    let ambientGain = null;
    const audioBuffers = {};
    const activeLoops = {}; // currently playing looping sources

    /** Initialize Web Audio API on first user interaction. */
    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            sfxGain = audioCtx.createGain();
            sfxGain.gain.value = AUDIO_CFG.defaultVolumes.sfx;
            sfxGain.connect(masterGain);
            musicGain = audioCtx.createGain();
            musicGain.gain.value = AUDIO_CFG.defaultVolumes.music;
            musicGain.connect(masterGain);
            ambientGain = audioCtx.createGain();
            ambientGain.gain.value = AUDIO_CFG.defaultVolumes.ambient;
            ambientGain.connect(masterGain);
            // Load all sound files
            loadSound('playerFire', 'assets/player-fire.mp3');
            loadSound('playerDeath', 'assets/player-death.mp3');
            loadSound('enemyDeath', 'assets/enemy-death.mp3');
            loadSound('mineDetonate', 'assets/mine-detonate.mp3');
            loadSound('minePlacement', 'assets/mine-placement.mp3');
            loadSound('levelComplete', 'assets/level-complete.mp3');
            loadSound('levelBegin', 'assets/level-begin.mp3');
            loadSound('gameOver', 'assets/game-over.mp3');
            loadSound('deepOneRescued', 'assets/deep-one-rescued.mp3');
            loadSound('deepOneAbducted', 'assets/deep-one-abducted.mp3');
            loadSound('monolithAttack', 'assets/monolith-attack.mp3');
            loadSound('ambient', 'assets/ambient-underwater.mp3');
            loadSound('music', 'assets/music.mp3');
        } catch (e) {
            // Web Audio not available — silent fail
        }
    }

    /** Load an audio file into a buffer. */
    function loadSound(key, url) {
        if (!audioCtx) return;
        fetch(url)
            .then(r => r.arrayBuffer())
            .then(buf => audioCtx.decodeAudioData(buf))
            .then(decoded => { audioBuffers[key] = decoded; })
            .catch(() => { /* file not found or decode error — silent */ });
    }

    // Per-sound volume multipliers
    const SOUND_VOLUMES = {
        playerFire: 1.0,
        playerDeath: 1.5,
        enemyDeath: 0.5,
        mineDetonate: 1.5,
        minePlacement: 0.5,
        levelComplete: 4.2,
        levelBegin: 1.25,
        gameOver: 1.25,
        deepOneRescued: 1.875,
        deepOneAbducted: 1.5,
        monolithAttack: 2.0,
        ambient: 1.25,
        music: 3.375,
    };

    /** Play a one-shot sound effect. */
    function playSound(key) {
        if (!audioCtx || !audioBuffers[key] || state.muted) return;
        try {
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffers[key];
            const vol = SOUND_VOLUMES[key] || 1.0;
            if (vol !== 1.0) {
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = vol;
                gainNode.connect(sfxGain);
                source.connect(gainNode);
            } else {
                source.connect(sfxGain);
            }
            source.start(0);
        } catch (e) { /* silent */ }
    }

    /** Start a looping sound (music or ambient). */
    /** Start a looping sound (music or ambient). Retries if buffer not loaded yet. */
    function startLoop(key, gainNode) {
        if (!audioCtx) return;
        if (!audioBuffers[key]) {
            // Buffer not loaded yet — retry after a short delay
            let retries = 0;
            const retryInterval = setInterval(() => {
                retries++;
                if (audioBuffers[key]) {
                    clearInterval(retryInterval);
                    startLoop(key, gainNode);
                } else if (retries > 30) { // give up after ~3 seconds
                    clearInterval(retryInterval);
                }
            }, 100);
            return;
        }
        stopLoop(key); // stop existing if playing
        try {
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffers[key];
            source.loop = true;
            const vol = SOUND_VOLUMES[key] || 1.0;
            if (vol !== 1.0) {
                const volNode = audioCtx.createGain();
                volNode.gain.value = vol;
                volNode.connect(gainNode || musicGain);
                source.connect(volNode);
            } else {
                source.connect(gainNode || musicGain);
            }
            source.start(0);
            activeLoops[key] = source;
        } catch (e) { /* silent */ }
    }

    /** Stop a looping sound. */
    function stopLoop(key) {
        if (activeLoops[key]) {
            try { activeLoops[key].stop(); } catch (e) { /* silent */ }
            delete activeLoops[key];
        }
    }

    /** Stop all loops. */
    function stopAllLoops() {
        for (const key in activeLoops) stopLoop(key);
    }

    /** Update master mute state. */
    function updateMute() {
        if (masterGain) {
            masterGain.gain.value = state.muted ? 0 : 1;
        }
    }

    /**
     * Resize the canvas element to fit the window while maintaining
     * the native 480×270 aspect ratio. Uses integer scaling for
     * pixel-perfect rendering. Accounts for devicePixelRatio (Retina)
     * by scaling the canvas backing store to match physical pixels,
     * preventing the browser from applying bilinear upscaling.
     */
    function resizeCanvas() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;

        // Account for footer and touch controls height
        const creditsEl = document.getElementById('credits');
        const tipJarEl = document.querySelector('.tip-jar-section');
        const touchEl = document.getElementById('touch-controls');
        let footerH = 0;
        if (creditsEl) footerH += creditsEl.offsetHeight || 0;
        if (tipJarEl) footerH += tipJarEl.offsetHeight || 0;
        if (touchEl && touchEl.style.display !== 'none') footerH += touchEl.offsetHeight || 0;

        const availH = vh - footerH - 10;

        // Integer scaling based on available space
        let scale = Math.floor(Math.min(vw / W, availH / H));
        if (scale < 1) scale = 1;

        // CSS size (logical pixels)
        canvas.style.width = (W * scale) + 'px';
        canvas.style.height = (H * scale) + 'px';

        // Backing store size (physical pixels) — match the CSS size × dpr
        // so the browser doesn't blur the canvas on HiDPI screens.
        const bufferW = W * scale * dpr;
        const bufferH = H * scale * dpr;

        if (canvas.width !== bufferW || canvas.height !== bufferH) {
            canvas.width = bufferW;
            canvas.height = bufferH;
            // Scale context so draw calls still use the native 480×270 coords
            ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
            // Disable image smoothing for crisp pixel art
            ctx.imageSmoothingEnabled = false;
        }
    }

    // Scale on load and on every resize
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ── Canvas & World ──────────────────────────────────────────
    const WORLD_W = 1920; // 4 screens wide
    const SEA_SURFACE_Y = 20;
    const SEA_BOTTOM_Y = 250;
    const GROUND_H = 20; // ground features zone: y 250-270

    // ── Player Config ───────────────────────────────────────────
    const PLAYER_CFG = {
        w: 80, h: 29,
        accel: 0.35,           // pixels/frame² at 60fps
        decel: 0.15,           // friction when no input
        maxSpeed: 3.5,         // pixels/frame at 60fps
        shotSpeed: 6.0,        // projectile speed
        shotCooldown: 8,       // frames between shots (≈133ms)
        maxBullets: 4,         // max on-screen player projectiles
        shotLifetime: 90,      // frames before projectile expires
        startLives: 3,
        maxLives: 6,
        invincibilityDuration: 150, // frames (≈2.5s)
        respawnDelay: 60,      // frames before respawn
        hb: { x: 6, y: 3, w: 68, h: 23 }, // hitbox offset from sprite
        animFrames: 2,         // 2-frame swim animation
        animInterval: 14,      // frames between animation frames
    };

    // ── Dash Config ─────────────────────────────────────────────
    const DASH_CFG = {

        cooldown: 180,         // frames (≈3s)
    };

    // ── Smart Bomb Config ───────────────────────────────────────
    const BOMB_CFG = {
        startCount: 3,
        maxCount: 5,
        earnPerLevel: 1,
    };

    // ── Enemy Configs ───────────────────────────────────────────
    const ENEMY_CFG = {
        abductor: {

            carrySpeed: 0.6,       // slower while carrying Deep One
            points: 150,
            hb: { x: 4, y: 4, w: 32, h: 44 },

            animInterval: 12,
        },
        crab: {
            w: 50, h: 27,
            speed: 0.8,
            damagePerFrame: 0.08,  // damage to Monolith per frame while in contact
            points: 100,
            hb: { x: 4, y: 2, w: 42, h: 23 },
            animFrames: 2,
            animInterval: 10,
        },
        pursuer: {
            w: 70, h: 36,
            baseSpeed: 1.5,

            fireChance: 0.015,     // per-frame probability of firing
            maxFireChance: 0.04,
            points: 200,

        },
        drifter: {

            bombDropChance: 0.006, // per-frame chance to drop a mine
            points: 75,
            hb: { x: 4, y: 4, w: 42, h: 32 },
            animFrames: 2,
            animInterval: 14,
        },
        mutant: {

        },
    };

    // ── Enemy Glow Points ──────────────────────────────────────
    // Per-frame glow pixel positions (relative to sprite top-left, facing right).
    // Automatically flipped horizontally when enemy faces left.
    // Each entry: { x, y, color } — color defaults to '#ffeb3b' (yellow) if omitted.
    const ENEMY_GLOW_POINTS = {
        abductor: [
            [{ x: 20, y: 10 }, { x: 28, y: 12 }, { x: 32, y: 14 }],
            [{ x: 17, y: 11 }, { x: 27, y: 14 }, { x: 31, y: 16 }],
        ],
        crab: [
            [{ x: 21, y: 7 }, { x: 27, y: 7 }],
            [{ x: 22, y: 7 }, { x: 28, y: 7 }],
        ],
        pursuer: [
            [{ x: 57, y: 14 }],
            [{ x: 56, y: 16 }],
        ],
        drifter: [
            [{ x: 25, y: 8 }, { x: 30, y: 8 }],
            [{ x: 25, y: 9 }, { x: 29, y: 8 }],
        ],
        mutant: [
            [{ x: 62, y: 12 }, { x: 72, y: 13 }],
            [{ x: 62, y: 13 }, { x: 72, y: 14 }],
        ],
    };

    // ── Enemy Projectile Config ─────────────────────────────────
    const ENEMY_PROJ_CFG = {
        w: 4, h: 4,
        speed: 2.5,
        maxOnScreen: 12,
        hb: { x: 0, y: 0, w: 4, h: 4 },
    };

    // ── Drifter Mine Config ─────────────────────────────────────
    const MINE_CFG = {
        w: 8, h: 8,
        hb: { x: 1, y: 1, w: 6, h: 6 },
        lifetime: 300,             // frames before mine expires (~5s)
        maxOnScreen: 8,
        pulseSpeed: 0.015,         // radians per ms for glow pulse
    };

    // ── Utility Functions ────────────────────────────────────────

    /**
     * AABB collision detection. Returns true if two rectangles overlap.
     * Each rect must have {x, y, w, h} properties.
     */
    function aabb(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    /**
     * Seeded PRNG (mulberry32). Returns a function that produces
     * deterministic random numbers in [0, 1).
     */
    function createRNG(seed) {
        return function() {
            seed |= 0; seed = seed + 0x6D2B79F5 | 0;
            let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }
    let rng = createRNG(Date.now());

    /**
     * World-wrap: keeps x within [0, worldW) using modular arithmetic.
     */
    function wrapPosition(x, worldW) {
        return ((x % worldW) + worldW) % worldW;
    }

    /**
     * If magnitude of (vx, vy) exceeds maxSpeed, scale both components
     * down proportionally. Returns {vx, vy}.
     */
    function normalizeVelocity(vx, vy, maxSpeed) {
        const mag = Math.sqrt(vx * vx + vy * vy);
        if (mag > maxSpeed) {
            const scale = maxSpeed / mag;
            return { vx: vx * scale, vy: vy * scale };
        }
        return { vx, vy };
    }

    /**
     * Calculate delta-time normalized to 60fps frame baseline (16.667ms).
     * Capped at TIMING.dtCap to prevent physics explosions on tab-away.
     */
    function computeDt(now, lastTime) {
        if (lastTime === 0) return 1;
        const raw = (now - lastTime) / 16.667;
        return Math.min(raw, TIMING.dtCap);
    }

    /**
     * Difficulty scaling with plateau. Computes a value that increases
     * linearly from param.base by param.inc per level, capped at param.cap.
     * Levels beyond SCALING.plateauLevel use the plateau level value.
     */
    function getScaledValue(param, level) {
        const effectiveLevel = Math.min(level, SCALING.plateauLevel);
        const value = param.base + param.inc * (effectiveLevel - 1);
        if (param.inc > 0) return Math.min(value, param.cap);
        return Math.max(value, param.cap);
    }

    /**
     * Proportional mapping of a world X position to mini-map pixel position.
     */
    function calculateMiniMapPosition(worldX, worldW, mapW) {
        return worldX * (mapW / worldW);
    }

    /**
     * Check if an entity is visible in the viewport, accounting for world wrap.
     * Returns true if any part of the entity is within the viewport.
     */
    function isInViewport(entityX, entityW, cameraX, viewportW, worldW) {
        // Normalize entity position relative to camera, accounting for wrap
        let relX = entityX - cameraX;
        if (relX < -worldW / 2) relX += worldW;
        if (relX > worldW / 2) relX -= worldW;
        // Entity is visible if its right edge is past viewport left
        // and its left edge is before viewport right
        return relX + entityW > 0 && relX < viewportW;
    }

    /**
     * Returns effective screen shake intensity, reduced when accessibility
     * shake reduction is enabled.
     */
    function getEffectiveShakeIntensity(baseIntensity, accessibility) {
        return baseIntensity * (accessibility.reduceShake ? ACCESSIBILITY_CFG.shakeReductionFactor : 1.0);
    }

    /**
     * Determine game-over cause. Returns 'player_death' if lives <= 0,
     * 'monolith_destroyed' if monolithHP <= 0, or null if game continues.
     */
    function getLossReason(lives, monolithHP) {
        if (lives <= 0) return 'player_death';
        if (monolithHP <= 0) return 'monolith_destroyed';
        return null;
    }

    /**
     * Calculate end-of-level bonus from surviving Deep Ones and Monolith health.
     */
    function calculateBonus(survivingDeepOnes, monolithHealthPercent) {
        return (survivingDeepOnes * SCORE_CFG.endOfLevel.deepOneSurvivalBonus) +
               (monolithHealthPercent * SCORE_CFG.endOfLevel.monolithHealthBonus);
    }

    /**
     * Parse and validate a high score value from localStorage.
     * Returns a non-negative integer, or 0 if the value is invalid.
     */
    function validateHighScore(rawValue) {
        const parsed = parseInt(rawValue, 10);
        if (!Number.isFinite(parsed) || parsed < 0) return 0;
        return Math.floor(parsed);
    }

    /**
     * Returns a random number between min and max (inclusive) using
     * the seeded RNG.
     */
    function randomRange(min, max) {
        return min + rng() * (max - min);
    }

    /**
     * Euclidean distance between two points.
     */
    function distanceBetween(x1, y1, x2, y2) {
        const dx = x1 - x2;
        const dy = y1 - y2;
        return Math.sqrt(dx * dx + dy * dy);
    }

    /**
     * Find a spawn position at least minDist from the player and all enemies.
     * Tries random positions within the world; returns the first safe one.
     * Falls back to a random position after maxAttempts.
     */
    function findSafeSpawnPosition(playerX, playerY, enemies, minDist, worldW) {
        const maxAttempts = 50;
        for (let i = 0; i < maxAttempts; i++) {
            const x = rng() * worldW;
            const y = SEA_SURFACE_Y + rng() * (SEA_BOTTOM_Y - SEA_SURFACE_Y);
            // Check distance from player (accounting for world wrap)
            const dxPlayer = Math.abs(x - playerX);
            const wrappedDxPlayer = Math.min(dxPlayer, worldW - dxPlayer);
            const distToPlayer = Math.sqrt(wrappedDxPlayer * wrappedDxPlayer + (y - playerY) * (y - playerY));
            if (distToPlayer < minDist) continue;
            // Check distance from all enemies
            let safe = true;
            for (let j = 0; j < enemies.length; j++) {
                const e = enemies[j];
                if (!e.alive) continue;
                const dxEnemy = Math.abs(x - e.x);
                const wrappedDxEnemy = Math.min(dxEnemy, worldW - dxEnemy);
                const distToEnemy = Math.sqrt(wrappedDxEnemy * wrappedDxEnemy + (y - e.y) * (y - e.y));
                if (distToEnemy < minDist) { safe = false; break; }
            }
            if (safe) return { x, y };
        }
        // Fallback: return a random position
        return { x: rng() * worldW, y: SEA_SURFACE_Y + rng() * (SEA_BOTTOM_Y - SEA_SURFACE_Y) };
    }

    /** Draw a single 8×8 character at (x, y) in the given color. */
    function drawChar(ch, x, y, color) {
        const glyph = FONT[ch];
        if (!glyph) return;
        ctx.fillStyle = color;
        for (let row = 0; row < 8; row++) {
            const bits = glyph[row];
            for (let col = 0; col < 8; col++) {
                if (bits & (1 << (7 - col))) {
                    ctx.fillRect(x + col, y + row, 1, 1);
                }
            }
        }
    }

    /** Draw a string of text at (x, y). Each character is 8px wide. */
    function drawText(text, x, y, color) {
        const c = color || '#c8d8c8';
        const str = String(text).toUpperCase();
        for (let i = 0; i < str.length; i++) {
            drawChar(str[i], x + i * 8, y, c);
        }
    }

    /** Draw text centered horizontally at the given y. */
    function drawTextCenter(text, y, color) {
        const str = String(text).toUpperCase();
        const w = str.length * 8;
        drawText(str, Math.round((W - w) / 2), y, color || '#c8d8c8');
    }

    /** Draw text at 2× size (16px per character), centered. */
    function drawTextLarge(text, y, color) {
        const c = color || '#c8d8c8';
        const str = String(text).toUpperCase();
        const totalW = str.length * 16;
        const startX = Math.round((W - totalW) / 2);
        ctx.fillStyle = c;
        for (let i = 0; i < str.length; i++) {
            const glyph = FONT[str[i]];
            if (!glyph) continue;
            const cx = startX + i * 16;
            for (let row = 0; row < 8; row++) {
                const bits = glyph[row];
                for (let col = 0; col < 8; col++) {
                    if (bits & (1 << (7 - col))) {
                        ctx.fillRect(cx + col * 2, y + row * 2, 2, 2);
                    }
                }
            }
        }
    }

    // ── Entity Classes ──────────────────────────────────────────

    /**
     * Entity base class. All game objects (player, enemies, projectiles,
     * particles) extend this. Provides position, velocity, hitbox,
     * animation state, and flash timer.
     */
    class Entity {
        constructor(x, y, cfg) {
            this.x = x;
            this.y = y;
            this.w = cfg.w;
            this.h = cfg.h;
            this.vx = 0;
            this.vy = 0;
            this.alive = true;
            this.hb = cfg.hb;
            this.animFrame = 0;
            this.animTimer = 0;
            this.animInterval = cfg.animInterval || 12;
            this.animFrames = cfg.animFrames || 1;
            this.flashTimer = 0;
        }
        getHitbox() {
            return { x: this.x + this.hb.x, y: this.y + this.hb.y, w: this.hb.w, h: this.hb.h };
        }
        updateAnimation(dt) {
            this.animTimer += dt;
            if (this.animTimer >= this.animInterval) {
                this.animTimer -= this.animInterval;
                this.animFrame = (this.animFrame + 1) % this.animFrames;
            }
            if (this.flashTimer > 0) this.flashTimer -= dt;
        }
        kill() { this.alive = false; }
    }

    /**
     * Player class. Acceleration-based movement with facing direction,
     * shot cooldown with input buffering, dash, bomb, and damage handling.
     */
    class Player extends Entity {
        constructor(x, y) {
            super(x, y, PLAYER_CFG);
            this.facingRight = true;
            this.shotCooldownTimer = 0;
            this.fireBuffered = false;
            this.dashCooldownTimer = 0;
            this.isDashing = false;
            this.dashTimer = 0;
            this.invincibilityTimer = 0;
        }
        update(dt, input) {
            // Update dash state
            if (this.isDashing) {
                this.dashTimer -= dt;
                if (this.dashTimer <= 0) {
                    this.isDashing = false;
                    this.dashTimer = 0;
                    // Kill dash velocity so player doesn't coast
                    this.vx = Math.sign(this.vx) * PLAYER_CFG.maxSpeed * 0.5;
                    this.vy = 0;
                }
            }

            // Movement: during dash, velocity is locked to dash speed
            if (!this.isDashing) {
                // Apply acceleration in pressed directions
                if (input.left) this.vx -= PLAYER_CFG.accel * dt;
                if (input.right) this.vx += PLAYER_CFG.accel * dt;
                if (input.up) this.vy -= PLAYER_CFG.accel * dt;
                if (input.down) this.vy += PLAYER_CFG.accel * dt;

                // Apply deceleration when no input on an axis
                if (!input.left && !input.right) {
                    if (Math.abs(this.vx) < PLAYER_CFG.decel * dt * 2) {
                        this.vx = 0;
                    } else {
                        this.vx -= Math.sign(this.vx) * PLAYER_CFG.decel * dt * 2;
                    }
                }
                if (!input.up && !input.down) {
                    if (Math.abs(this.vy) < PLAYER_CFG.decel * dt * 2) {
                        this.vy = 0;
                    } else {
                        this.vy -= Math.sign(this.vy) * PLAYER_CFG.decel * dt * 2;
                    }
                }

                // Normalize velocity to prevent faster diagonal movement, clamp to maxSpeed
                const norm = normalizeVelocity(this.vx, this.vy, PLAYER_CFG.maxSpeed);
                this.vx = norm.vx;
                this.vy = norm.vy;
            }

            // Update position
            this.x += this.vx * dt;
            this.y += this.vy * dt;

            // Wrap X with world wrapping
            this.x = wrapPosition(this.x, WORLD_W);

            // Clamp Y between sea surface and sea bottom
            if (this.y < SEA_SURFACE_Y) this.y = SEA_SURFACE_Y;
            if (this.y > SEA_BOTTOM_Y - this.h) this.y = SEA_BOTTOM_Y - this.h;

            // Update facing direction on horizontal input change
            if (input.right && !input.left) this.facingRight = true;
            if (input.left && !input.right) this.facingRight = false;

            // Decrement cooldown timers
            if (this.shotCooldownTimer > 0) this.shotCooldownTimer -= dt;
            if (this.dashCooldownTimer > 0) this.dashCooldownTimer -= dt;
            if (this.invincibilityTimer > 0) this.invincibilityTimer -= dt;

            // Handle fire buffering: if buffered and cooldown expired, fire
            if (this.fireBuffered && this.shotCooldownTimer <= 0) {
                this.fireBuffered = false;
            }

            // Update animation
            this.updateAnimation(dt);
        }
        fire(projectilePool) {
            if (this.shotCooldownTimer <= 0 && projectilePool.count < PLAYER_CFG.maxBullets) {
                const dir = this.facingRight ? 1 : -1;
                const projX = this.facingRight ? this.x + this.w : this.x - 4;
                const projY = this.y + this.h / 2 - 4;
                projectilePool.acquire(projX, projY, PLAYER_CFG.shotSpeed * dir, 0);
                this.shotCooldownTimer = PLAYER_CFG.shotCooldown;
                this.fireBuffered = false;
                return true;
            }
            if (this.shotCooldownTimer > 0) {
                this.fireBuffered = true;
            }
            return false;
        }
        dash() {
            if (this.dashCooldownTimer <= 0 && !this.isDashing) {
                this.isDashing = true;
                this.dashTimer = DASH_CFG.duration;
                this.dashCooldownTimer = DASH_CFG.cooldown;
                // Apply dash speed in facing direction, zero vertical
                const dir = this.facingRight ? 1 : -1;
                this.vx = DASH_CFG.speed * dir;
                this.vy = 0;
                return true;
            }
            return false;
        }
        activateBomb(state) {
            if (state && state.bombs > 0) {
                return true; // actual bomb logic handled by game code
            }
            return false;
        }
        takeDamage() {
            if (this.invincibilityTimer > 0 || this.isDashing) {
                return false; // invulnerable — no damage
            }
            return true; // actual damage logic handled by game code
        }
    }

    /**
     * ObjectPool — pre-allocated pool for frequently created/destroyed
     * entities (projectiles, particles). Avoids runtime allocation and GC.
     */
    class ObjectPool {
        constructor(factory, size) {
            this.pool = [];
            this.active = [];
            for (let i = 0; i < size; i++) this.pool.push(factory());
        }
        acquire(x, y, vx, vy) {
            const obj = this.pool.pop();
            if (!obj) return null;
            obj.x = x; obj.y = y; obj.vx = vx; obj.vy = vy;
            obj.alive = true; obj.lifetime = 0;
            obj.animFrame = 0; obj.animTimer = 0; obj.flashTimer = 0;
            this.active.push(obj);
            return obj;
        }
        release(obj) {
            const idx = this.active.indexOf(obj);
            if (idx !== -1) { this.active.splice(idx, 1); this.pool.push(obj); }
        }
        releaseAll() {
            while (this.active.length > 0) this.pool.push(this.active.pop());
        }
        forEach(fn) { for (let i = 0; i < this.active.length; i++) fn(this.active[i], i); }
        get count() { return this.active.length; }
    }

    /**
     * Projectile class. Used for both player and enemy projectiles,
     * differentiated by which pool they belong to. Tracks lifetime
     * and auto-kills when expired.
     */
    class Projectile extends Entity {
        constructor(cfg) {
            super(0, 0, cfg);
            this.lifetime = 0;
            this.maxLifetime = cfg.maxLifetime || PLAYER_CFG.shotLifetime;
        }
        update(dt) {
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.lifetime += dt;
            if (this.lifetime > this.maxLifetime) {
                this.kill();
                return;
            }
            // Wrap X position
            this.x = wrapPosition(this.x, WORLD_W);
            this.updateAnimation(dt);
        }
    }

    /**
     * Particle class. Short-lived visual effect with position, velocity,
     * lifetime, color, and alpha fade.
     */
    class Particle extends Entity {
        constructor() {
            super(0, 0, { w: 2, h: 2, hb: { x: 0, y: 0, w: 2, h: 2 } });
            this.lifetime = 0;
            this.maxLifetime = 30;
            this.alpha = 1;
            this.scale = 1;
            this.color = '#ffffff';
        }
        init(x, y, vx, vy, lifetime, color, scale) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.lifetime = lifetime;
            this.maxLifetime = lifetime;
            this.alpha = 1;
            this.scale = scale || 1;
            this.color = color || '#ffffff';
            this.alive = true;
        }
        update(dt) {
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.lifetime -= dt;
            this.alpha = Math.max(0, this.lifetime / this.maxLifetime);
            if (this.lifetime <= 0) this.kill();
        }
    }

    /**
     * DeepOne class. Small humanoid sea creatures that wander near their
     * spawn position, repair the Monolith when damaged, can be abducted
     * by Abductors, and dart away when freed.
     */
    class DeepOne extends Entity {
        constructor(x, y) {
            super(x, y, DEEP_ONE_CFG);
            this.state = 'WANDERING';
            this.spawnX = x;
            this.targeted = false;
            this.carriedBy = null;
            this.beingAbducted = false;
            this.repairTarget = null;
            this.wanderDir = rng() < 0.5 ? 1 : -1;
            this.wanderTimer = Math.floor(randomRange(30, 90));
        }
        update(dt, monolith, enemiesCleared) {
            switch (this.state) {
                case 'WANDERING': {
                    // If enemies are cleared and Monolith needs repair, go repair
                    if (enemiesCleared && monolith && monolith.hp < MONOLITH_CFG.maxHP) {
                        this.state = 'REPAIRING';
                        break;
                    }

                    // Wander near spawnX within wanderRadius at wanderSpeed
                    this.x += this.wanderDir * DEEP_ONE_CFG.wanderSpeed * dt;

                    // Reverse direction if too far from spawn
                    if (Math.abs(this.x - this.spawnX) > DEEP_ONE_CFG.wanderRadius) {
                        this.wanderDir = (this.x > this.spawnX) ? -1 : 1;
                    }

                    // Randomly change direction at intervals
                    this.wanderTimer -= dt;
                    if (this.wanderTimer <= 0) {
                        this.wanderDir = rng() < 0.5 ? 1 : -1;
                        this.wanderTimer = Math.floor(randomRange(30, 90));
                    }

                    // Check if Monolith needs repair and we're close enough
                    if (monolith && monolith.hp < MONOLITH_CFG.maxHP) {
                        const dist = distanceBetween(this.x, this.y, monolith.x, monolith.y);
                        if (dist < DEEP_ONE_CFG.repairRange) {
                            this.state = 'REPAIRING';
                        }
                    }
                    break;
                }
                case 'REPAIRING': {
                    // Move toward monolith
                    if (monolith) {
                        const dx = monolith.x + monolith.w / 2 - (this.x + this.w / 2);
                        const dy = monolith.y + monolith.h - (this.y + this.h);
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist > 4) {
                            // Move toward monolith at seek speed
                            const speed = DEEP_ONE_CFG.seekSpeed;
                            this.x += (dx / dist) * speed * dt;
                            this.y += (dy / dist) * speed * dt;
                        } else {
                            // Close enough — repair
                            monolith.repair(DEEP_ONE_CFG.repairRate * dt);
                        }

                        // If monolith at full HP, switch back to wandering
                        if (monolith.hp >= MONOLITH_CFG.maxHP) {
                            this.state = 'WANDERING';
                        }
                    }
                    break;
                }
                case 'BEING_ABDUCTED': {
                    // Position controlled by Abductor — do nothing here
                    break;
                }
                case 'DARTING_AWAY': {
                    // Move at dartSpeed in dart direction
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;

                    // Kill after leaving viewport (generous bounds)
                    if (this.y < -50 || this.y > H + 50 ||
                        this.x < -50 || this.x > WORLD_W + 50) {
                        this.kill();
                    }
                    break;
                }
            }
            this.updateAnimation(dt);
        }
        startAbduction(abductor) {
            this.state = 'BEING_ABDUCTED';
            this.beingAbducted = true;
            this.carriedBy = abductor || null;
            playSound('deepOneAbducted');
            // Only show alert if monolith alert isn't active
            if (state.monolithAlertTimer <= 0) {
                state.deepOneAlertTimer = 120;
            }
        }
        release() {
            this.state = 'DARTING_AWAY';
            this.beingAbducted = false;
            this.carriedBy = null;
            // Pick random dart direction
            const angle = rng() * Math.PI * 2;
            this.vx = Math.cos(angle) * DEEP_ONE_CFG.dartSpeed;
            this.vy = Math.sin(angle) * DEEP_ONE_CFG.dartSpeed;
        }
    }

    /**
     * Monolith class. Lovecraftian obelisk on the sea bottom.
     * Has HP, damage states, and can be repaired by Deep Ones.
     */
    class Monolith extends Entity {
        constructor(x, y) {
            super(x, y, MONOLITH_CFG);
            this.hp = MONOLITH_CFG.maxHP;
            this.maxHP = MONOLITH_CFG.maxHP;
            this.damageState = 0; // 0=undamaged, 1=cracked, 2=heavily damaged
        }
        takeDamage(amount) {
            this.hp = Math.max(0, this.hp - amount);
            this.damageState = this.getDamageState();
            this.flashTimer = TIMING.hitFlashFrames;
        }
        repair(amount) {
            this.hp = Math.min(this.maxHP, this.hp + amount);
            this.damageState = this.getDamageState();
        }
        getDamageState() {
            const pct = this.hp / this.maxHP;
            if (pct > 0.66) return 0;  // undamaged
            if (pct > 0.33) return 1;  // cracked
            return 2;                   // heavily damaged
        }
    }

    /**
     * Abductor class. Flying enemy that seeks out Deep Ones, grabs them,
     * and ascends to the surface to mutate them. If no targets are available,
     * drifts in a sinusoidal pattern.
     * FSM states: SEEKING, GRABBING, ASCENDING, MUTATING, DRIFTING
     */
    class Abductor extends Entity {
        constructor(x, y, speedMultiplier) {
            super(x, y, ENEMY_CFG.abductor);
            this.type = 'abductor';
            this.speedMultiplier = speedMultiplier || 1;
            this.state = 'DRIFTING';    // start drifting, not seeking
            this.target = null;         // reference to targeted DeepOne
            this.grabTimer = 0;         // frames spent in GRABBING state
            this.shouldMutate = false;  // flag for game code to create Mutant
            // Drifting state
            this.driftAngle = rng() * Math.PI * 2;
            this.driftTimer = 0;
            this.seekDelay = 300;       // ~5 seconds before seeking (300 frames at 60fps)
        }
        update(dt, deepOnes, monolith, player) {
            // Delay before first seek
            if (this.seekDelay > 0) {
                this.seekDelay -= dt;
                // Stay in DRIFTING until delay expires
                if (this.state === 'SEEKING') this.state = 'DRIFTING';
            }
            switch (this.state) {
                case 'SEEKING': {
                    if (!this.target || !this.target.alive || this.target.beingAbducted) {
                        this.target = null;
                        this.selectTarget(deepOnes);
                    }
                    if (!this.target) {
                        this.state = 'DRIFTING';
                        break;
                    }
                    // Move toward target Deep One
                    const dx = this.target.x - this.x;
                    const dy = this.target.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const speed = ENEMY_CFG.abductor.speed * this.speedMultiplier;
                    if (dist > 4) {
                        this.vx = (dx / dist) * speed;
                        this.vy = (dy / dist) * speed;
                        this.x += this.vx * dt;
                        this.y += this.vy * dt;
                    } else {
                        // Reached target — start grabbing
                        this.state = 'GRABBING';
                        this.grabTimer = 0;
                    }
                    break;
                }
                case 'GRABBING': {
                    this.grabTimer += dt;
                    if (this.grabTimer >= 4) {
                        // Attach Deep One
                        if (this.target && this.target.alive) {
                            this.target.startAbduction(this);
                            this.state = 'ASCENDING';
                        } else {
                            // Target died during grab — seek new one
                            this.target = null;
                            this.state = 'SEEKING';
                        }
                    }
                    break;
                }
                case 'ASCENDING': {
                    // Move upward toward sea surface
                    const carrySpeed = ENEMY_CFG.abductor.carrySpeed;
                    this.vy = -carrySpeed;
                    this.vx = 0;
                    this.y += this.vy * dt;
                    // Deep One follows Abductor position
                    if (this.target && this.target.alive) {
                        this.target.x = this.x;
                        this.target.y = this.y + this.h;
                    }
                    // Check if reached surface
                    if (this.y <= SEA_SURFACE_Y) {
                        this.y = SEA_SURFACE_Y;
                        this.state = 'MUTATING';
                        this.shouldMutate = true;
                    }
                    break;
                }
                case 'MUTATING': {
                    // Flag is set — game code handles Mutant creation and cleanup
                    break;
                }
                case 'DRIFTING': {
                    // Sinusoidal drift pattern (like a Drifter)
                    this.driftTimer += dt;
                    const driftSpeed = ENEMY_CFG.abductor.speed * this.speedMultiplier * 0.5;
                    this.vx = Math.cos(this.driftAngle) * driftSpeed;
                    this.vy = Math.sin(this.driftAngle) * driftSpeed * 0.5 +
                              Math.sin(this.driftTimer * 0.05) * 0.3;
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    // Clamp to playable area
                    if (this.y < SEA_SURFACE_Y) this.y = SEA_SURFACE_Y;
                    if (this.y > SEA_BOTTOM_Y - this.h) this.y = SEA_BOTTOM_Y - this.h;
                    this.x = wrapPosition(this.x, WORLD_W);
                    // Slowly rotate drift angle
                    this.driftAngle += 0.01 * dt;
                    // Check if a Deep One becomes available (only after seek delay)
                    if (this.seekDelay <= 0 && deepOnes && deepOnes.some(d => d.alive && !d.targeted && !d.beingAbducted)) {
                        this.state = 'SEEKING';
                    }
                    break;
                }
            }
            // Wrap X position
            this.x = wrapPosition(this.x, WORLD_W);
            this.updateAnimation(dt);
        }
        selectTarget(deepOnes) {
            if (!deepOnes) return;
            let nearest = null;
            let nearestDist = Infinity;
            for (let i = 0; i < deepOnes.length; i++) {
                const d = deepOnes[i];
                if (!d.alive || d.targeted || d.beingAbducted) continue;
                const dx = Math.abs(this.x - d.x);
                const wrappedDx = Math.min(dx, WORLD_W - dx);
                const dy = this.y - d.y;
                const dist = Math.sqrt(wrappedDx * wrappedDx + dy * dy);
                if (dist < nearestDist) {
                    nearestDist = dist;
                    nearest = d;
                }
            }
            if (nearest) {
                this.target = nearest;
                nearest.targeted = true;
            }
        }
        releaseDeepOne() {
            if (this.target && this.target.alive) {
                this.target.release();
                this.target.targeted = false;
            }
            this.target = null;
        }
        kill() {
            // Release carried Deep One on destruction
            if (this.target) {
                if (this.target.alive && this.target.beingAbducted) {
                    this.target.release();
                }
                this.target.targeted = false;
                this.target = null;
            }
            this.alive = false;
        }
    }

    /**
     * Crab class. Ground-based enemy that marches along the sea bottom
     * toward the Monolith and attacks it on contact.
     * FSM states: MARCHING, ATTACKING, QUEUED
     */
    class Crab extends Entity {
        constructor(x, y, speedMultiplier) {
            super(x, y, ENEMY_CFG.crab);
            this.type = 'crab';
            this.speedMultiplier = speedMultiplier || 1;
            this.state = 'MARCHING';
            this.attackPhase = Math.random() * Math.PI * 2; // unique vertical bob phase
        }
        update(dt, monolith, attackingCrabCount) {
            switch (this.state) {
                case 'MARCHING': {
                    // Move along sea bottom toward Monolith x-position
                    this.y = SEA_BOTTOM_Y - this.h;
                    if (monolith && monolith.alive) {
                        const targetX = monolith.x + monolith.w / 2 - this.w / 2;
                        const dx = targetX - this.x;
                        const dist = Math.abs(dx);
                        const speed = ENEMY_CFG.crab.speed * this.speedMultiplier;

                        if (dist > this.w / 2) {
                            this.vx = Math.sign(dx) * speed;
                            this.x += this.vx * dt;
                        } else {
                            // Reached Monolith — check if we can attack or must queue
                            if (attackingCrabCount < THREAT_CFG.maxCrabsAttacking) {
                                this.state = 'ATTACKING';
                                playSound('monolithAttack');
                                // Only show alert if deep one alert isn't active
                                if (state.deepOneAlertTimer <= 0) {
                                    state.monolithAlertTimer = 120;
                                }
                            } else {
                                this.state = 'QUEUED';
                            }
                        }
                    }
                    break;
                }
                case 'ATTACKING': {
                    // Position on monolith center, bob up and down
                    if (monolith && monolith.alive) {
                        this.x = monolith.x + monolith.w / 2 - this.w / 2;
                        this.attackPhase += 0.06 * dt;
                        // Bob vertically along the monolith face
                        const bobRange = monolith.h - this.h - 4;
                        const bobOffset = (Math.sin(this.attackPhase) * 0.5 + 0.5) * bobRange;
                        this.y = monolith.y + 2 + bobOffset;
                        monolith.takeDamage(ENEMY_CFG.crab.damagePerFrame * dt);
                    }
                    break;
                }
                case 'QUEUED': {
                    // Wait at queue distance from Monolith
                    this.y = SEA_BOTTOM_Y - this.h;
                    if (monolith && monolith.alive) {
                        const targetX = monolith.x + monolith.w / 2 - this.w / 2;
                        const dx = targetX - this.x;
                        const queueX = targetX - Math.sign(dx) * THREAT_CFG.crabQueueDistance;
                        const qdx = queueX - this.x;
                        const speed = ENEMY_CFG.crab.speed * this.speedMultiplier;

                        if (Math.abs(qdx) > 2) {
                            this.vx = Math.sign(qdx) * speed;
                            this.x += this.vx * dt;
                        } else {
                            this.vx = 0;
                        }

                        // Check if a slot opened up
                        if (attackingCrabCount < THREAT_CFG.maxCrabsAttacking) {
                            this.state = 'MARCHING';
                        }
                    }
                    break;
                }
            }
            this.x = wrapPosition(this.x, WORLD_W);
            this.updateAnimation(dt);
        }
    }

    /**
     * Pursuer class. Aggressive enemy that chases the player and
     * periodically fires projectiles.
     * FSM states: CHASING, FIRING
     */
    class Pursuer extends Entity {
        constructor(x, y, speedMultiplier, fireRateMult) {
            super(x, y, ENEMY_CFG.pursuer);
            this.type = 'pursuer';
            this.speedMultiplier = speedMultiplier || 1;
            this.fireRateMult = fireRateMult || 1;
            this.state = 'CHASING';
            this.fireTimer = 0;     // frames spent in FIRING state
            this.shouldFire = false; // flag for game code to spawn projectile
        }
        update(dt, playerX, playerY) {
            switch (this.state) {
                case 'CHASING': {
                    // Move toward player using shortest path with world wrap
                    let dx = playerX - this.x;
                    const dy = playerY - this.y;
                    // Account for world wrap — take shortest path
                    if (dx > WORLD_W / 2) dx -= WORLD_W;
                    if (dx < -WORLD_W / 2) dx += WORLD_W;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const speed = Math.min(
                        ENEMY_CFG.pursuer.baseSpeed * this.speedMultiplier,
                        ENEMY_CFG.pursuer.maxSpeed
                    );
                    if (dist > 1) {
                        this.vx = (dx / dist) * speed;
                        this.vy = (dy / dist) * speed;
                    }
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    // Clamp to playable area
                    if (this.y < SEA_SURFACE_Y) this.y = SEA_SURFACE_Y;
                    if (this.y > SEA_BOTTOM_Y - this.h) this.y = SEA_BOTTOM_Y - this.h;
                    // Fire chance check
                    const effectiveFireChance = Math.min(
                        ENEMY_CFG.pursuer.fireChance * this.fireRateMult,
                        ENEMY_CFG.pursuer.maxFireChance
                    );
                    if (rng() < effectiveFireChance) {
                        this.state = 'FIRING';
                        this.fireTimer = 0;
                        this.shouldFire = false;
                    }
                    break;
                }
                case 'FIRING': {
                    // Brief pause then fire
                    this.fireTimer += dt;
                    if (this.fireTimer >= 4) {
                        this.shouldFire = true;
                        this.state = 'CHASING';
                    }
                    break;
                }
            }
            this.x = wrapPosition(this.x, WORLD_W);
            this.updateAnimation(dt);
        }
    }

    /**
     * Drifter class. Passive enemy that floats through the water in
     * semi-random patterns with sinusoidal wobble.
     * FSM state: DRIFTING
     */
    class Drifter extends Entity {
        constructor(x, y, speedMultiplier) {
            super(x, y, ENEMY_CFG.drifter);
            this.type = 'drifter';
            this.speedMultiplier = speedMultiplier || 1;
            this.state = 'DRIFTING';
            // Pick initial random direction
            const angle = rng() * Math.PI * 2;
            this.dirX = Math.cos(angle);
            this.dirY = Math.sin(angle);
            // Direction change timer
            this.dirChangeTimer = Math.floor(
                randomRange(ENEMY_CFG.drifter.dirChangeInterval.min,
                            ENEMY_CFG.drifter.dirChangeInterval.max)
            );
            this.wobblePhase = rng() * Math.PI * 2;
            this.shouldDropMine = false; // flag for game code to spawn mine
        }
        update(dt) {
            const speed = ENEMY_CFG.drifter.speed * this.speedMultiplier;

            // Direction change countdown
            this.dirChangeTimer -= dt;
            if (this.dirChangeTimer <= 0) {
                // Pick new random direction using seeded RNG
                const angle = rng() * Math.PI * 2;
                this.dirX = Math.cos(angle);
                this.dirY = Math.sin(angle);
                this.dirChangeTimer = Math.floor(
                    randomRange(ENEMY_CFG.drifter.dirChangeInterval.min,
                                ENEMY_CFG.drifter.dirChangeInterval.max)
                );
            }

            // Apply sinusoidal wobble perpendicular to movement direction
            this.wobblePhase += 0.08 * dt;
            const wobbleAmount = Math.sin(this.wobblePhase) * 0.3;
            // Perpendicular vector to (dirX, dirY) is (-dirY, dirX)
            const moveX = this.dirX * speed + (-this.dirY) * wobbleAmount;
            const moveY = this.dirY * speed + this.dirX * wobbleAmount;

            this.x += moveX * dt;
            this.y += moveY * dt;

            // Clamp to playable area, bounce off boundaries
            if (this.y < SEA_SURFACE_Y) {
                this.y = SEA_SURFACE_Y;
                this.dirY = Math.abs(this.dirY);
            }
            if (this.y > SEA_BOTTOM_Y - this.h) {
                this.y = SEA_BOTTOM_Y - this.h;
                this.dirY = -Math.abs(this.dirY);
            }

            // Mine drop chance
            if (ENEMY_CFG.drifter.bombDropChance && rng() < ENEMY_CFG.drifter.bombDropChance * dt) {
                this.shouldDropMine = true;
            }

            // Wrap X position
            this.x = wrapPosition(this.x, WORLD_W);
            this.updateAnimation(dt);
        }
    }

    /**
     * Mutant class. Fast, aggressive enemy created when an Abductor
     * reaches the surface with a Deep One. Chases the player relentlessly
     * using shortest-path with world wrap. No firing — pure contact threat.
     */
    class Mutant extends Entity {
        constructor(x, y) {
            super(x, y, ENEMY_CFG.mutant);
            this.type = 'mutant';
            this.state = 'CHASING';
        }
        update(dt, playerX, playerY) {
            // Chase player using shortest-path with world wrap
            let dx = playerX - this.x;
            const dy = playerY - this.y;
            // Account for world wrap — take shortest path
            if (dx > WORLD_W / 2) dx -= WORLD_W;
            if (dx < -WORLD_W / 2) dx += WORLD_W;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const speed = ENEMY_CFG.mutant.speed;
            if (dist > 1) {
                this.vx = (dx / dist) * speed;
                this.vy = (dy / dist) * speed;
            }
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            // Clamp to playable area
            if (this.y < SEA_SURFACE_Y) this.y = SEA_SURFACE_Y;
            if (this.y > SEA_BOTTOM_Y - this.h) this.y = SEA_BOTTOM_Y - this.h;
            // Wrap X position
            this.x = wrapPosition(this.x, WORLD_W);
            this.updateAnimation(dt);
        }
    }

    // ── Game State ──────────────────────────────────────────────

    // Valid state transitions map
    const VALID_TRANSITIONS = {
        'START_SCREEN':     ['PLAYING', 'LEVEL_TRANSITION'],
        'PLAYING':          ['PAUSED', 'DEATH_PAUSE', 'LEVEL_TRANSITION', 'GAME_OVER'],
        'PAUSED':           ['PLAYING'],
        'DEATH_PAUSE':      ['PLAYING', 'GAME_OVER'],
        'LEVEL_TRANSITION': ['PLAYING'],
        'GAME_OVER':        ['START_SCREEN', 'PLAYING'],
    };

    const state = {
        mode: 'START_SCREEN',
        level: 1,
        score: 0,
        highScore: 0,
        lives: PLAYER_CFG.startLives,
        bombs: BOMB_CFG.startCount,
        dt: 0,
        lastTime: 0,
        comboMultiplier: 1,
        comboTimer: 0,
        dashCooldownTimer: 0,
        dashActiveTimer: 0,
        isDashing: false,
        enemiesRemaining: 0,
        enemiesSpawnedThisLevel: 0,
        deepOnesRemaining: 0,
        deathTimer: 0,
        transitionTimer: 0,
        invincibilityTimer: 0,
        summaryTimer: 0,
        damageVignetteTimer: 0,
        bombFlashTimer: 0,
        monolithAlertTimer: 0,
        deepOneAlertTimer: 0,
        levelAnnounce: false,      // true = showing "LEVEL X" start, false = showing completion
        attractMode: false,
        attractTimer: 480,         // ~8 seconds before demo starts
        attractPhase: 'title',     // 'title' or 'demo'
        muted: false,
        volumes: { ...AUDIO_CFG.defaultVolumes },
        nextExtraLifeScore: SCORE_CFG.extraLifeInterval,
        pauseStartTime: 0,
        lossReason: null,
        stats: {
            levelsCompleted: 0,
            enemiesDestroyed: 0,
            deepOnesSaved: 0,
            maxCombo: 0,
            startTime: 0,
        },
        accessibility: {
            reduceShake: false,
            highContrastMiniMap: false,
        },
    };

    /**
     * Transition to a new game state. Validates the transition is legal
     * according to the state machine. Illegal transitions are logged
     * to the console and ignored.
     */
    function setState(newMode) {
        const allowed = VALID_TRANSITIONS[state.mode];
        if (!allowed || !allowed.includes(newMode)) {
            console.warn(`Illegal state transition: ${state.mode} → ${newMode}`);
            return;
        }
        state.mode = newMode;
    }

    // ── Entity Arrays & Object Pools (Task 6.5) ────────────────

    let player = null;
    let monolith = null;
    let enemies = [];
    let deepOnes = [];
    let mines = [];  // Drifter-dropped mines
    let tentacles = []; // Static tentacle obstacles

    let playerProjectilePool = new ObjectPool(
        () => new Projectile({
            w: 8, h: 4,
            hb: { x: 0, y: 0, w: 8, h: 4 },
            maxLifetime: PLAYER_CFG.shotLifetime,
            animFrames: 1,
            animInterval: 1,
        }),
        POOL_SIZES.playerProjectiles
    );

    let enemyProjectilePool = new ObjectPool(
        () => new Projectile({
            w: 30, h: 30,
            hb: { x: 6, y: 6, w: 18, h: 18 },
            maxLifetime: 120,
            animFrames: 1,
            animInterval: 1,
        }),
        POOL_SIZES.enemyProjectiles
    );

    let particlePool = new ObjectPool(
        () => new Particle(),
        POOL_SIZES.particles
    );

    // ── Input Manager (Task 6.3) ────────────────────────────────

    const input = {
        left: false, right: false, up: false, down: false,
        fire: false, dash: false, bomb: false, pause: false, mute: false, quit: false,
        fireBuffered: false,

        _keys: {},
        _gamepadIndex: null,

        // Track previous frame state for edge-detection (single-press actions)
        _prevPause: false,
        _prevMute: false,
        _prevQuit: false,
        _prevFire: false,
        _prevBomb: false,
        _prevDash: false,

        /**
         * Poll all input sources (keyboard + gamepad) and merge into
         * the action booleans. Called once per frame before update().
         */
        poll() {
            const keys = this._keys;

            // ── Keyboard state ──
            const kbLeft  = !!(keys['ArrowLeft']  || keys['KeyA']);
            const kbRight = !!(keys['ArrowRight'] || keys['KeyD']);
            const kbUp    = !!(keys['ArrowUp']    || keys['KeyW']);
            const kbDown  = !!(keys['ArrowDown']  || keys['KeyS']);
            const kbFire  = !!(keys['Space']      || keys['KeyZ']);
            const kbBomb  = !!(keys['KeyX']       || keys['KeyB']);
            const kbDash  = !!(keys['ShiftLeft']  || keys['ShiftRight'] || keys['KeyC']);
            const kbPause = !!(keys['Escape']     || keys['KeyP']);
            const kbMute  = !!(keys['KeyM']);
            const kbQuit  = !!(keys['KeyQ']);

            // ── Gamepad state ──
            let gpLeft = false, gpRight = false, gpUp = false, gpDown = false;
            let gpFire = false, gpDash = false, gpBomb = false, gpPause = false;

            if (this._gamepadIndex !== null) {
                try {
                    const gamepads = navigator.getGamepads();
                    const gp = gamepads[this._gamepadIndex];
                    if (gp) {
                        // D-pad (buttons 12-15)
                        gpUp    = gp.buttons[12] ? gp.buttons[12].pressed : false;
                        gpDown  = gp.buttons[13] ? gp.buttons[13].pressed : false;
                        gpLeft  = gp.buttons[14] ? gp.buttons[14].pressed : false;
                        gpRight = gp.buttons[15] ? gp.buttons[15].pressed : false;

                        // Left stick (axis 0 = horizontal, axis 1 = vertical)
                        if (gp.axes.length >= 2) {
                            const deadzone = 0.3;
                            if (gp.axes[0] < -deadzone) gpLeft = true;
                            if (gp.axes[0] >  deadzone) gpRight = true;
                            if (gp.axes[1] < -deadzone) gpUp = true;
                            if (gp.axes[1] >  deadzone) gpDown = true;
                        }

                        // Face buttons: A(0)=fire, B(1)=dash, X(2)=bomb, Start(9)=pause
                        gpFire  = gp.buttons[0] ? gp.buttons[0].pressed : false;
                        gpDash  = gp.buttons[1] ? gp.buttons[1].pressed : false;
                        gpBomb  = gp.buttons[2] ? gp.buttons[2].pressed : false;
                        gpPause = gp.buttons[9] ? gp.buttons[9].pressed : false;
                    }
                } catch (e) {
                    // Gamepad API can throw in some browsers; ignore
                }
            }

            // ── Merge all sources (keyboard + gamepad + touch) ──
            const t = this._touch;
            this.left  = kbLeft  || gpLeft  || t.left;
            this.right = kbRight || gpRight || t.right;
            this.up    = kbUp    || gpUp    || t.up;
            this.down  = kbDown  || gpDown  || t.down;

            // For single-press actions, detect rising edge (pressed this frame, not last)
            const rawFire  = kbFire  || gpFire  || t.fire;
            const rawBomb  = kbBomb  || gpBomb  || t.bomb;
            const rawDash  = kbDash  || gpDash  || t.dash;
            const rawPause = kbPause || gpPause;
            const rawMute  = kbMute;
            const rawQuit  = kbQuit;

            this.fire  = rawFire  && !this._prevFire;
            this.bomb  = rawBomb  && !this._prevBomb;
            this.dash  = rawDash  && !this._prevDash;
            this.pause = rawPause && !this._prevPause;
            this.mute  = rawMute  && !this._prevMute;
            this.quit  = rawQuit  && !this._prevQuit;

            // Fire buffering: keep true if held (continuous for fire)
            this.fireBuffered = rawFire;

            // Store for next frame edge detection
            this._prevFire  = rawFire;
            this._prevBomb  = rawBomb;
            this._prevDash  = rawDash;
            this._prevPause = rawPause;
            this._prevMute  = rawMute;
            this._prevQuit  = rawQuit;
        },

        /**
         * Set up keyboard event listeners. Tracks key state by code.
         * Clears all keys on window blur to prevent stuck keys.
         */
        initKeyboard() {
            window.addEventListener('keydown', (e) => {
                this._keys[e.code] = true;
                // Prevent default for game keys to avoid scrolling etc.
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
                     'Space', 'Escape'].includes(e.code)) {
                    e.preventDefault();
                }
            });
            window.addEventListener('keyup', (e) => {
                this._keys[e.code] = false;
            });
            // Clear all keys when window loses focus to prevent stuck keys
            window.addEventListener('blur', () => {
                this._keys = {};
            });
            // Also clear on visibility change (tab switch)
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) this._keys = {};
            });
        },

        /**
         * Set up gamepad connection/disconnection listeners.
         */
        initGamepad() {
            window.addEventListener('gamepadconnected', (e) => {
                this._gamepadIndex = e.gamepad.index;
            });
            window.addEventListener('gamepaddisconnected', (e) => {
                if (this._gamepadIndex === e.gamepad.index) {
                    this._gamepadIndex = null;
                }
            });
        },

        // Touch state
        _touch: { left: false, right: false, up: false, down: false, fire: false, bomb: false, dash: false },

        /**
         * Set up touch controls for mobile. Shows/hides based on viewport width.
         */
        initTouch() {
            const controlsEl = document.getElementById('touch-controls');
            const instructionsEl = document.getElementById('touch-instructions');
            const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0 || window.innerWidth <= TOUCH_CFG.breakpoint;

            if (isMobile && controlsEl) {
                controlsEl.style.display = 'block';
                if (instructionsEl) instructionsEl.style.display = 'block';
            }

            // D-pad buttons
            const dirBtns = controlsEl ? controlsEl.querySelectorAll('[data-dir]') : [];
            dirBtns.forEach((btn) => {
                const dir = btn.getAttribute('data-dir');
                const setActive = (active) => {
                    this._touch[dir] = active;
                    btn.classList.toggle('active', active);
                };
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); setActive(true); });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); setActive(false); });
                btn.addEventListener('touchcancel', (e) => { e.preventDefault(); setActive(false); });
            });

            // Action buttons
            const actionBtns = controlsEl ? controlsEl.querySelectorAll('[data-action]') : [];
            actionBtns.forEach((btn) => {
                const action = btn.getAttribute('data-action');
                const setActive = (active) => {
                    this._touch[action] = active;
                    btn.classList.toggle('active', active);
                };
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); setActive(true); });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); setActive(false); });
                btn.addEventListener('touchcancel', (e) => { e.preventDefault(); setActive(false); });
            });

            // Also allow tapping the canvas to fire (for start screen)
            const canvas = document.getElementById('game');
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                this._touch.fire = true;
            });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                this._touch.fire = false;
            });
        },
    };

    // ── Camera System ───────────────────────────────────────────

    const camera = {
        x: 0, y: 0,
        targetX: 0, targetY: 0,
        lookAheadX: 0,
        shakeX: 0, shakeY: 0,
        shakeAmplitude: 0,
        bombFreezeFrames: 0,
    };

    function updateCamera(dt) {
        if (!player) return;
        if (camera.bombFreezeFrames > 0) {
            camera.bombFreezeFrames -= dt;
            return;
        }
        const facingDir = player.facingRight ? 1 : -1;
        const speedLookAhead = Math.abs(player.vx) * CAMERA_CFG.lookAheadSpeedScale;
        const targetLookAhead = facingDir * (CAMERA_CFG.lookAheadBase + speedLookAhead);
        camera.lookAheadX += (targetLookAhead - camera.lookAheadX) * CAMERA_CFG.lookAheadTransitionSpeed * dt;

        // Target camera position centered on player with look-ahead
        let targetX = player.x + player.w / 2 - W / 2 + camera.lookAheadX;
        camera.targetY = player.y + player.h / 2 - H / 2 + CAMERA_CFG.verticalBias;
        camera.targetY = Math.max(0, Math.min(SEA_BOTTOM_Y + GROUND_H - H, camera.targetY));

        // Smooth wrap-aware lerp for X
        let dx = targetX - camera.x;
        // Take shortest path across the world wrap seam
        if (dx > WORLD_W / 2) dx -= WORLD_W;
        if (dx < -WORLD_W / 2) dx += WORLD_W;

        const effectiveLerp = (player.isDashing ? CAMERA_CFG.lerpSpeed * 3 : CAMERA_CFG.lerpSpeed);
        camera.x += dx * effectiveLerp * dt;
        camera.y += (camera.targetY - camera.y) * effectiveLerp * dt;

        // Keep camera X in [0, WORLD_W)
        camera.x = wrapPosition(camera.x, WORLD_W);

        if (camera.shakeAmplitude > 0.5) {
            const eff = getEffectiveShakeIntensity(camera.shakeAmplitude, state.accessibility);
            camera.shakeX = (Math.random() - 0.5) * 2 * eff;
            camera.shakeY = (Math.random() - 0.5) * 2 * eff;
            camera.shakeAmplitude *= CAMERA_CFG.shakeDecay;
        } else {
            camera.shakeX = 0;
            camera.shakeY = 0;
            camera.shakeAmplitude = 0;
        }
    }

    function triggerShake(intensity) {
        camera.shakeAmplitude = Math.max(camera.shakeAmplitude, intensity);
    }

    // ── Procedural Background ───────────────────────────────────

    // Generate static ground features once
    const groundFeatures = [];
    let groundOccupiedRanges = []; // shared between generateBackground and initLevel
    const bgStars = []; // distant bioluminescent dots for far layer
    const fishSchools = []; // background fish schools
    let causticPhase = 0;
    const bubbles = [];

    // Terrain heightmap for ocean floor (Defender-style rolling mountains)
    const TERRAIN_RESOLUTION = 8; // pixels per terrain sample (coarser = smoother)
    const TERRAIN_SAMPLES = Math.ceil(WORLD_W / TERRAIN_RESOLUTION) + 1;
    let terrainHeights = []; // array of Y values (top of terrain at each sample)

    /**
     * Generate smooth rolling terrain using fixed-seed sine layers.
     * Produces gentle slopes and broad mountains like Defender.
     */
    function generateTerrain() {
        terrainHeights = [];
        // Fixed seed offsets for deterministic terrain (no per-sample rng calls)
        const seed1 = rng() * 1000;
        const seed2 = rng() * 1000;
        const seed3 = rng() * 1000;

        for (let i = 0; i < TERRAIN_SAMPLES; i++) {
            const x = i * TERRAIN_RESOLUTION;
            // Base height
            let h = SEA_BOTTOM_Y;
            // Large broad mountains (very low frequency)
            h -= (Math.sin(x * 0.0015 + seed1) * 0.5 + 0.5) * 35;
            // Medium rolling hills
            h -= (Math.sin(x * 0.005 + seed2) * 0.5 + 0.5) * 15;
            // Gentle variation
            h -= (Math.sin(x * 0.015 + seed3) * 0.5 + 0.5) * 5;
            // Clamp
            h = Math.max(SEA_BOTTOM_Y - 50, Math.min(SEA_BOTTOM_Y + 2, h));
            terrainHeights.push(h);
        }
        // Ensure seamless wrap: blend last few samples toward first
        const blendZone = 20;
        for (let i = 0; i < blendZone; i++) {
            const t = i / blendZone;
            const endIdx = TERRAIN_SAMPLES - blendZone + i;
            terrainHeights[endIdx] = terrainHeights[endIdx] * (1 - t) + terrainHeights[i] * t;
        }
    }

    /** Get terrain height at a given world X position (interpolated). */
    function getTerrainHeight(worldX) {
        const wrapped = wrapPosition(worldX, WORLD_W);
        const idx = wrapped / TERRAIN_RESOLUTION;
        const i0 = Math.floor(idx) % TERRAIN_SAMPLES;
        const i1 = (i0 + 1) % TERRAIN_SAMPLES;
        const t = idx - Math.floor(idx);
        return terrainHeights[i0] * (1 - t) + terrainHeights[i1] * t;
    }

    function generateBackground() {
        groundFeatures.length = 0;
        bgStars.length = 0;

        // Generate smooth terrain
        generateTerrain();

        // Place a few ruins and houses at random sizes, no overlapping
        // Reserved positions: monolith at WORLD_W/2, plus tentacles and other structures
        const occupiedRanges = []; // array of {x, w} representing occupied horizontal spans
        // Reserve monolith position
        const monoX = WORLD_W / 2 - MONOLITH_CFG.w / 2;
        occupiedRanges.push({ x: monoX - 20, w: MONOLITH_CFG.w + 40 });

        const structureCount = 6 + Math.floor(rng() * 4); // 6-9 structures total
        for (let i = 0; i < structureCount; i++) {
            const type = rng() < 0.5 ? 'ruin' : 'house';
            const w = 16 + Math.floor(rng() * 20); // 16–36px wide
            // Find a non-overlapping position
            let x = 0;
            let placed = false;
            for (let attempt = 0; attempt < 30; attempt++) {
                x = rng() * WORLD_W;
                let overlap = false;
                for (let r = 0; r < occupiedRanges.length; r++) {
                    const range = occupiedRanges[r];
                    if (x + w > range.x && x < range.x + range.w) {
                        overlap = true;
                        break;
                    }
                }
                if (!overlap) { placed = true; break; }
            }
            if (!placed) continue; // skip if can't find space
            occupiedRanges.push({ x: x, w: w + 10 }); // add padding
            const h = w; // placeholder, overridden at render
            const terrainY = getTerrainHeight(x);
            groundFeatures.push({
                type, x, y: terrainY - h, w, h,
                color: type === 'house' ? '#2a3a4a' : '#3a4a5a',
            });
        }

        // Store occupied ranges for tentacle placement in initLevel
        groundOccupiedRanges = occupiedRanges;

        // Far layer bioluminescent dots (each with unique parallax depth)
        for (let i = 0; i < 80; i++) {
            bgStars.push({
                x: rng() * WORLD_W,
                y: SEA_SURFACE_Y + rng() * (SEA_BOTTOM_Y - SEA_SURFACE_Y),
                r: 1 + rng() * 2,
                phase: rng() * Math.PI * 2,
                speed: 0.01 + rng() * 0.02,
                hue: 160 + rng() * 60,
                parallax: 0.15 + rng() * 0.35, // each dot scrolls at its own depth (0.15–0.5)
                driftX: (rng() - 0.5) * 0.02,  // slow horizontal drift
                driftY: (rng() - 0.5) * 0.01,  // slow vertical drift
            });
        }

        // Fish schools (small groups swimming in the background)
        fishSchools.length = 0;
        const schoolCount = 5 + Math.floor(rng() * 4); // 5-8 schools
        for (let i = 0; i < schoolCount; i++) {
            const fishCount = 4 + Math.floor(rng() * 6); // 4-9 fish per school
            const baseX = rng() * WORLD_W;
            const baseY = SEA_SURFACE_Y + 30 + rng() * (SEA_BOTTOM_Y - SEA_SURFACE_Y - 80);
            const dir = rng() < 0.5 ? 1 : -1; // swimming direction
            const speed = 0.3 + rng() * 0.5; // school speed
            const parallax = 0.2 + rng() * 0.3; // depth layer
            const hue = 180 + rng() * 40; // blue-green tint
            const fish = [];
            for (let f = 0; f < fishCount; f++) {
                fish.push({
                    offsetX: (rng() - 0.5) * 30, // spread within school
                    offsetY: (rng() - 0.5) * 16,
                    size: 2 + rng() * 2,
                    wobblePhase: rng() * Math.PI * 2,
                    wobbleSpeed: 0.05 + rng() * 0.03,
                });
            }
            fishSchools.push({ baseX, baseY, dir, speed, parallax, hue, fish });
        }
    }

    // ── Scoring & Damage ────────────────────────────────────────

    function awardPoints(basePoints) {
        const points = basePoints * state.comboMultiplier;
        state.score += points;
        state.comboTimer = SCORE_CFG.comboWindow;
        state.comboMultiplier = Math.min(state.comboMultiplier + 1, SCORE_CFG.comboMultiplierMax);
        if (state.comboMultiplier > state.stats.maxCombo) {
            state.stats.maxCombo = state.comboMultiplier;
        }
        // Extra life check
        if (state.score >= state.nextExtraLifeScore && state.lives < PLAYER_CFG.maxLives) {
            state.lives++;
            state.nextExtraLifeScore += SCORE_CFG.extraLifeInterval;
        }
        if (state.score > state.highScore) {
            state.highScore = state.score;
        }
    }

    function resetCombo() {
        state.comboMultiplier = 1;
        state.comboTimer = 0;
    }

    function spawnExplosion(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            const p = particlePool.acquire(x, y,
                (Math.random() - 0.5) * 3,
                (Math.random() - 0.5) * 3
            );
            if (p) {
                p.lifetime = 15 + Math.random() * 20;
                p.maxLifetime = p.lifetime;
                p.color = color;
                p.alpha = 1;
                p.scale = 1 + Math.random();
            }
        }
    }

    function damageEnemy(enemy) {
        const wasCarrying = enemy.type === 'abductor' && enemy.target && enemy.target.alive && enemy.target.beingAbducted;
        if (wasCarrying) {
            enemy.releaseDeepOne();
            state.stats.deepOnesSaved++;
            awardPoints(SCORE_CFG.rescueBonus);
            playSound('deepOneRescued');
        }
        const cfg = ENEMY_CFG[enemy.type];
        if (cfg) awardPoints(cfg.points);
        state.stats.enemiesDestroyed++;
        spawnExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, '#44ff66', 30);
        playSound('enemyDeath');
        enemy.kill();
    }

    function playerHit() {
        if (!player || !player.alive) return;
        if (player.invincibilityTimer > 0 || player.isDashing) return;
        state.lives--;
        resetCombo();
        state.damageVignetteTimer = TIMING.damageVignetteFrames;
        triggerShake(TIMING.screenShakeIntensity * 2);
        // Large red death explosion with fast-moving particles
        const deathX = player.x + player.w / 2;
        const deathY = player.y + player.h / 2;
        for (let i = 0; i < 30; i++) {
            const angle = (Math.PI * 2 / 30) * i + (Math.random() - 0.5) * 0.5;
            const speed = 2 + Math.random() * 4;
            const p = particlePool.acquire(deathX, deathY,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed
            );
            if (p) {
                p.lifetime = 40 + Math.random() * 40;
                p.maxLifetime = p.lifetime;
                p.color = i % 3 === 0 ? '#ff6600' : i % 3 === 1 ? '#ff3333' : '#ffcc00';
                p.alpha = 1;
                p.scale = 2 + Math.random() * 2;
            }
        }
        player.alive = false;
        state.deathTimer = 120; // 2 seconds at 60fps
        playSound('playerDeath');
        setState('DEATH_PAUSE');
    }

    function detonateBomb() {
        if (state.bombs <= 0) return;
        state.bombs--;
        state.bombFlashTimer = TIMING.bombFlashFrames;
        camera.bombFreezeFrames = 2;
        triggerShake(TIMING.bombShakeIntensity);
        // Destroy all enemies in viewport
        for (let i = 0; i < enemies.length; i++) {
            const e = enemies[i];
            if (!e.alive) continue;
            if (isInViewport(e.x, e.w, camera.x, W, WORLD_W)) {
                damageEnemy(e);
            }
        }
        // Destroy enemy projectiles in viewport
        enemyProjectilePool.forEach((p) => {
            if (isInViewport(p.x, p.w, camera.x, W, WORLD_W)) {
                p.kill();
            }
        });
        // Destroy mines in viewport
        for (let i = mines.length - 1; i >= 0; i--) {
            if (isInViewport(mines[i].x, MINE_CFG.w, camera.x, W, WORLD_W)) {
                spawnExplosion(mines[i].x + MINE_CFG.w / 2, mines[i].y + MINE_CFG.h / 2, '#44ff66', 4);
